<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Twitch Chat Viewer</title>

<style>
:root{
--bg:#0f0f12;
--panel:#15151b;
--text:#e7e7ea;
--muted:#a6a6b0;
--border:#2a2a35;
--accent:#9146ff;
--mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:var(--sans);
}

header{
position:sticky;
top:0;
z-index:10;
background:linear-gradient(180deg,rgba(21,21,27,0.98),rgba(21,21,27,0.92));
border-bottom:1px solid var(--border);
padding:12px;
}

.row{
  padding: 6px 12px;
  border-bottom:1px solid rgba(42,42,53,0.55);
  line-height: 1.35;
}

.time{
  font-family:var(--mono);
  color:var(--muted);
  margin-right: 6px;
  white-space:nowrap;
}

.user{
  font-weight:700;
  margin-right: 8px;
  white-space:nowrap;
}

.msg{
  color:var(--text);
  word-break:break-word;
  overflow-wrap:anywhere;
}

.meta{
display:flex;
flex-direction:column;
gap:6px;
}

.meta a{
color:var(--accent);
text-decoration:none;
}

.controls{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-top:10px;
}

input,button{
background:var(--panel);
border:1px solid var(--border);
color:var(--text);
padding:9px 10px;
border-radius:10px;
font-size:14px;
outline:none;
}

button{cursor:pointer;}

button:hover{
border-color:rgba(145,70,255,0.6);
}

.pill{
font-family:var(--mono);
color:var(--muted);
font-size:12px;
}

#list{padding-bottom:40px;}

.emote{
height:24px;
vertical-align:middle;
margin:0 2px;
}
</style>
</head>

</div>

<script>

const DATA = JSON.parse(
  document.getElementById("chat-data").textContent
);

const meta = DATA.meta || {};
const rows = DATA.rows || [];

const MODE=meta.mode||"online";
const LOCAL_EMOTES = meta.local_emotes || {};
const TWITCH_CHANNEL_ID=meta.channel_id||null;

const elTitle=document.getElementById("title");
const elChannel=document.getElementById("channel");
const elVod=document.getElementById("vod");
const elStat=document.getElementById("stat");
const elList=document.getElementById("list");

const elQ=document.getElementById("q");
const elU=document.getElementById("u");
const elClear=document.getElementById("clear");

elTitle.textContent=meta.title||"—";
elChannel.textContent=meta.channel||"—";
elVod.href=meta.vod_url||"#";

function esc(s){
return (s??"").replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function fetch7tvEmotes(channelId){

if(!channelId)return new Map();

try{

const r=await fetch(`https://7tv.io/v3/users/twitch/${channelId}`);
if(!r.ok)return new Map();

const json=await r.json();
const emotes=json?.emote_set?.emotes||[];

const map=new Map();

for(const e of emotes){

const name=e?.name;
const host=e?.data?.host;

if(!name||!host)continue;

const files=host.files||[];

const file=
files.find(f=>f.name==="1x.webp")||
files.find(f=>String(f.name).endsWith(".webp"))||
files[0];

if(!file)continue;

map.set(name,`https:${host.url}/${file.name}`);

}

return map;

}catch(e){

return new Map();

}

}

function renderTextWithEmotes(el,text,emotes){

const parts=String(text||"").split(/(\s+)/);

for(const p of parts){

if(MODE==="local" && LOCAL_EMOTES[p]){

const img=document.createElement("img");
img.src=LOCAL_EMOTES[p];
img.alt=p;
img.title=p;
img.className="emote";
el.appendChild(img);

}else if(emotes.has(p)){

const img=document.createElement("img");
img.src=emotes.get(p);
img.alt=p;
img.title=p;
img.className="emote";
el.appendChild(img);

}else{

el.appendChild(document.createTextNode(p));

}

}

}

const CHUNK=800;

let filtered=rows;
let rendered=0;

let EMOTES=new Map();
let EMOTES_READY=false;

async function ensureEmotesLoaded(){

if(EMOTES_READY)return;

EMOTES_READY=true;

if(MODE!=="online")return;
if(!TWITCH_CHANNEL_ID)return;

EMOTES=await fetch7tvEmotes(TWITCH_CHANNEL_ID);

}

function matches(r,q,u){

if(u){
if(!r.user||r.user.toLowerCase().indexOf(u)===-1)return false;
}

if(q){
if(!r.text||r.text.toLowerCase().indexOf(q)===-1)return false;
}

return true;

}

async function applyFilters(){

await ensureEmotesLoaded();

const q=(elQ.value||"").trim().toLowerCase();
const u=(elU.value||"").trim().toLowerCase();

filtered=rows.filter(r=>matches(r,q,u));

elStat.textContent=`Показано: ${filtered.length} / ${rows.length}`;

elList.innerHTML="";
rendered=0;

renderMore();

}

function renderMore(){

const end=Math.min(rendered+CHUNK,filtered.length);

const frag=document.createDocumentFragment();

for (let i = rendered; i < end; i++) {
  const r = filtered[i];

  const rowEl = document.createElement("div");
  rowEl.className = "row";

  // нормализуем время: "00 : 17 : 52" -> "00:17:52"
  const tRaw = (r.t || "00:00:00");
  const tNorm = String(tRaw).replace(/\s*:\s*/g, ":");

  const timeEl = document.createElement("span");
  timeEl.className = "time";
  timeEl.textContent = `[${tNorm}]`;

  const userEl = document.createElement("span");
  userEl.className = "user";
  userEl.textContent = r.user || "—";

  const msgEl = document.createElement("span");
  msgEl.className = "msg";

  if (MODE === "online" && EMOTES && EMOTES.size) {
    renderTextWithEmotes(msgEl, r.text || "", EMOTES);
  } else {
    msgEl.textContent = r.text || "";
  }

rowEl.appendChild(timeEl);
rowEl.appendChild(userEl);
rowEl.appendChild(msgEl);

frag.appendChild(rowEl);

}

elList.appendChild(frag);

rendered=end;

}

let scrollTimer=null;

window.addEventListener("scroll",()=>{

if(scrollTimer)return;

scrollTimer=setTimeout(()=>{

scrollTimer=null;

const nearBottom=
window.innerHeight+window.scrollY>
document.body.offsetHeight-1200;

if(nearBottom&&rendered<filtered.length){
renderMore();
}

},80);

});

elQ.addEventListener("input",()=>applyFilters());
elU.addEventListener("input",()=>applyFilters());

elClear.addEventListener("click",()=>{
elQ.value="";
elU.value="";
applyFilters();
});

applyFilters();

</script>

</body>
</html>
