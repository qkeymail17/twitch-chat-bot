<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Twitch Chat Viewer</title>
<style>
:root{
  --bg:#0f0f12;
  --panel:#15151b;
  --text:#e7e7ea;
  --muted:#a6a6b0;
  --border:#2a2a35;

  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;

  --controls-w:312px; /* ширина левого блока на десктопе */
  --chat-w:515px;     /* ширина блока сообщений на десктопе */
  --gap:16px;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased}
.page{width:100%;display:flex;justify-content:center;padding:0}
.chat{
  width:100%;
  max-width:none;
  margin:0;
}

/* header / controls (mobile first) */
header{
  width:100%;
  max-width:none;
  background:#18181b;
  border-bottom:1px solid var(--border);
  padding:8px;
  box-sizing:border-box;
  position:sticky;
  top:0;
  z-index:50;
  border-radius:0;
}
.meta{
  display:flex;
  flex-direction:column;
  gap:2px;
  margin:0;
  min-width:0;
  height:100%;
}

.vod-heading{
  display:flex;
  align-items:flex-start;
  gap:8px;
  min-width:0;
  width:100%;
}

.vod-channel{
  flex:0 1 auto;
  max-width:min(45%, 240px);
  font-size:16px;
  font-weight:700;
  line-height:1.2;
  color:var(--text);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.vod-separator{
  flex:0 0 auto;
  color:var(--muted);
  line-height:1.25;
  transform:translateY(0.05em);
}

.vod-title{
  flex:1 1 auto;
  min-width:0;
  font-size:15px;
  font-weight:400;
  line-height:1.22;
  color:var(--text);
  display:-webkit-box;
  -webkit-line-clamp:3;
  -webkit-box-orient:vertical;
  overflow:hidden;
  word-break:break-word;
}
.vod-title.is-truncated{
  overflow:hidden;
}

.vod-card{
  margin-bottom:6px;
  border:1px solid var(--border);
  border-radius:18px;
  overflow:hidden;
  background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
  box-shadow:0 10px 30px rgba(0,0,0,.22);
  cursor:pointer;
  transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease;
}
.vod-card:hover{
  transform:translateY(-1px);
  border-color:rgba(145,70,255,0.45);
  box-shadow:0 14px 34px rgba(0,0,0,.28);
}
.vod-card:focus-visible{
  outline:2px solid rgba(145,70,255,0.65);
  outline-offset:2px;
}
.vod-card-media{
  position:relative;
  aspect-ratio:16/9;
  background:linear-gradient(135deg,#22222b,#15151b 55%, #0f0f12);
}
.vod-card-media img{
  width:100%;
  height:100%;
  display:block;
  object-fit:cover;
}
.vod-card-shade{
  position:absolute;
  inset:0;
  background:linear-gradient(180deg, rgba(0,0,0,.06) 35%, rgba(0,0,0,.7) 100%);
}
.vod-card-title{font-size:14px;font-weight:700;line-height:1.25;color:var(--text);overflow-wrap:anywhere;word-break:break-word;}
.pill{
  font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
  color:var(--muted);
  font-size:12px;
}
.controls{
  display:grid;
  grid-template-columns:repeat(6,minmax(0,1fr));
  gap:6px;
  margin-top:4px;
  width:100%;
  min-width:0;
}
.controls #q{
  grid-column:1 / span 3;
  grid-row:1;
}

.controls #u{
  grid-column:4 / span 3;
  grid-row:1;
}

.controls #vodBtn{
  grid-column:1 / span 2;
  grid-row:2;
}

.controls #exportBtn{
  grid-column:3 / span 2;
  grid-row:2;
}

.controls #toggleTime{
  grid-column:5 / span 2;
  grid-row:2;
}

.controls-footer{
  grid-column:1 / span 6;
  grid-row:3;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
  width:100%;
  min-width:0;
}
.controls-footer .pill{
  min-width:0;
  overflow-wrap:anywhere;
  word-break:break-word;
}

.controls input{
  flex:1 1 140px;
  min-width:0;
  height:36px;
  padding:6px 12px;
  border-radius:10px;
  background:var(--panel);
  border:1px solid var(--border);
  color:var(--text);
  font-size:13px;
}
.controls button{
  width:100%;
  height:36px;
  padding:0 12px;
  border-radius:10px;
  background:var(--panel);
  border:1px solid var(--border);
  color:var(--text);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

.button-toggle.active{
  background:rgba(145,70,255,0.18);
  border-color:rgba(145,70,255,0.6);
}

.controls button:hover{
  border-color:var(--border);
  background:var(--panel);
}

.toggle-button{
  transition:background .15s ease, border-color .15s ease, transform .15s ease;
}
.toggle-button.is-active{
  background:rgba(145,70,255,0.18);
  border-color:rgba(145,70,255,0.6);
}

.toggle-button.is-inactive{
  background:var(--panel);
  border-color:var(--border);
}

.meta-buttons{
  display:flex;
  gap:6px;
}

.meta-buttons button{
  flex:1;
  height:36px;
  font-size:13px;
  border-radius:10px;
  background:var(--panel);
  border:1px solid var(--border);
  color:var(--text);
}

.meta-buttons button:hover{
  border-color:var(--border);
  background:var(--panel);
}

.snapshot-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  padding:20px;
}

.snapshot-panel{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:10px;
  max-width:100%;
}

.snapshot-preview{
  max-width:min(100%, 1200px);
  max-height:min(80vh, 900px);
  border-radius:12px;
  box-shadow:0 10px 40px rgba(0,0,0,.6);
  display:block;
}

.snapshot-actions{
  display:flex;
  justify-content:flex-end;
  gap:8px;
  width:100%;
}

.snapshot-toggle{
  height:36px;
  padding:0 14px;
  border-radius:10px;
  background:var(--panel);
  border:1px solid var(--border);
  color:var(--text);
  cursor:pointer;
  transition:background .15s ease, border-color .15s ease, transform .15s ease;
}

.snapshot-toggle:hover{
  border-color:var(--border);
  background:var(--panel);
}

.snapshot-toggle.is-active{
  background:rgba(145,70,255,0.18);
  border-color:rgba(145,70,255,0.6);
}

.snapshot-toggle.is-inactive{
  background:var(--panel);
  border-color:var(--border);
}

/* message list */
#list{
  width:100%;
  max-width:390px;
  margin-left:auto;
  margin-right:auto;
  background:#1f1f23;
  min-height:100vh;
  padding-bottom:40px;
  margin-top:0;
  border-radius:0;
  overflow-x:hidden;
}

/* row */
.row{
  padding:6px 12px;
  line-height:1.4;
  overflow-wrap:anywhere;
}
.time{
  color:#adadb8;
  white-space:nowrap;
  margin-right:6px;
}
.user{
  font-weight:600;
  white-space:normal;
  overflow-wrap:anywhere;
  word-break:break-word;
  min-width:0;
}
.colon{
  color:var(--text);
  margin-right:6px;          /* пространство между ':' и началом сообщения */
}
.msg{
  display:inline;
  color:var(--text);
  overflow-wrap:anywhere;
  word-break:break-word;
  min-width:0;
}
.badges{
  display:inline-flex;
  align-items:center;
  gap:2px;
  margin-right:4px;
  vertical-align:middle;
  flex:0 0 auto;
}
.badge{
  width:18px;
  height:18px;
  display:inline-block;
  vertical-align:middle;
  object-fit:contain;
  image-rendering:auto;
}
.emote{vertical-align:middle;margin:0 2px}

/* export helper (unchanged) */
.export-wrap{position:fixed;left:-99999px;top:0;width:390px;background:#18181f;padding:24px}
.export-wrap.snapshot-hide-time .time{
  display:none !important;
}
.export-meta{display:flex;justify-content:space-between;align-items:center;margin-top:18px;padding-top:14px;border-top:1px solid rgba(255,255,255,.08);font-size:14px;color:#b9b9c6}
.export-meta-left{
  display:flex;
  align-items:center;
  gap:8px;
}

.export-meta-left img{
  height:20px;
}

/* ===== Desktop layout ===== */
@media (min-width: 900px){
  .page{padding:24px}
  .chat{max-width: calc(var(--controls-w) + var(--chat-w) + var(--gap)); display:flex; gap:var(--gap); align-items:flex-start}

  /* left column becomes fixed-ish via sticky */
  header{
    width:var(--controls-w);
    max-width:none;
    flex:0 0 var(--controls-w);
    position:sticky;
    top:24px; /* offset from viewport top */
    border-radius:14px;
    padding:12px;
    height:fit-content;
  }

  /* make controls vertical and full width of left column */
.controls{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-top:12px;
  align-items:stretch;
}

.controls input{
  flex:0 0 auto;
  height:36px !important;
  padding:6px 12px !important;
  line-height:1.2;
}

.controls button{
  flex:0 0 auto;
  height:36px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 12px;
}
.controls button{
  width:100%;
  height:36px;
  font-size:13px;
}

.controls input{
  width:100%;
  height:36px;
  padding:6px 12px;
  font-size:13px;
}

  /* messages column */
  #list{
    width:var(--chat-w);
    max-width:var(--chat-w);
    flex:0 0 var(--chat-w);
    border-radius:14px;
    min-height:calc(100vh - 48px);
    margin-top:0; /* header is in left column, not above messages */
  }

  /* center whole layout horizontally */
  .page{justify-content:center}
}

/* small refinements for very narrow phones (so content not glued to edges) */
@media (max-width:420px){
  .chat{padding:0 8px}
  header{padding:10px;border-radius:12px}
  #list{margin-top:0;border-radius:0}
}

@media (max-width: 700px){

  header{
    display:grid;
    grid-template-columns: 170px minmax(0,1fr);
    gap:10px;
    align-items:stretch;
    grid-template-rows:auto auto auto;
  }

  .vod-card{
    margin:0;
    grid-row:1 / span 2;
  }

  /* убираем текст под превью (иначе раздувает блок) */
  .vod-card-copy{
    display:none;
  }

  .meta{
    margin:0;
    grid-column:2;
    grid-row:1;
  }

  /* кнопки вниз */
  .controls{
    grid-column:1 / span 2;
    margin-top:8px;
    display:grid;
    grid-template-columns:repeat(6,minmax(0,1fr));
    gap:6px;
    min-width:0;
    grid-row:3;
  }

  .controls input{
    width:100%;
    min-width:0;
    height:36px;
    font-size:12px;
    padding:6px 12px;
  }

  .controls button{
    width:100%;
    min-width:0;
    height:36px;
    font-size:12px;
  }

  .controls-footer{
    grid-column:1 / span 6;
    grid-row:3;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:8px;
    width:100%;
    min-width:0;
  }

  .controls-footer .pill{
    min-width:0;
    overflow-wrap:anywhere;
    word-break:break-word;
  }

  /* кнопки под заголовком */
  .meta-buttons{
    grid-column:2;
    grid-row:2;
    display:flex;
    gap:6px;
  }
}
</style>
</head>
<body>
<div class="page">
  <div class="chat">

    <header>
      <div class="vod-card" id="vodCard" tabindex="0" role="button" aria-label="Открыть VOD">
        <div class="vod-card-media">
          <img id="vodPreviewImg" alt="" loading="eager" decoding="async" />
          <div class="vod-card-shade"></div>
        </div>
      </div>

      <div class="meta">
        <div class="vod-heading">
          <span id="channel" class="vod-channel">—</span>
          <span class="vod-separator" aria-hidden="true">•</span>
          <span id="title" class="vod-title">—</span>
        </div>

        <div class="meta-buttons">
          <button id="exportBtn" class="button-toggle active">📸 Снимок</button>
          <button id="toggleTime" class="toggle-button is-active" aria-pressed="true">⏱️ Время</button>
        </div>
      </div>

      <div class="controls">
        <input id="q" placeholder="Поиск по сообщениям…"/>
        <input id="u" placeholder="Фильтр по нику…"/>
        <div class="controls-footer">
          <span class="pill">
            <span id="streamDateWrap" style="display:none"><span id="streamDate">—</span></span>
          </span>
          <span class="pill" id="stat">—</span>
        </div>
      </div>
    </header>

    <div id="list"></div>

  </div>
</div>

<script id="chat-data" type="application/json">{{CHAT_DATA_JSON}}</script>

<script>
/* JS оставил без изменений логики — только адаптирован под новый DOM.
   Если что-то ломается, это будет видно в консоли, но визуальная часть
   теперь управляется только CSS (mobile: header scrolls away;
   desktop: left column sticky). */

const DATA = JSON.parse(document.getElementById("chat-data").textContent || "{}");
const meta = DATA.meta || {};
const rows = DATA.rows || [];
for(const r of rows){
  r._u = (r.user || "").toLowerCase();
  r._t = (r.text || "").toLowerCase();
}

const MODE = meta.mode || "online";
const LOCAL_EMOTES = meta.local_emotes || {};
const CDN_EMOTES = meta.cdn_emotes || {};
const BADGE_IMAGES = meta.badge_images || {};
const TWITCH_CHANNEL_ID = meta.channel_id || null;

const elTitle=document.getElementById("title");
const elChannel=document.getElementById("channel");
const elStat=document.getElementById("stat");
const elList=document.getElementById("list");

const elStreamDate=document.getElementById("streamDate");
const elStreamDateWrap=document.getElementById("streamDateWrap");

const elQ=document.getElementById("q");
const elU=document.getElementById("u");
const elToggleTime=document.getElementById("toggleTime");
const elExportBtn=document.getElementById("exportBtn");
const elVodCard=document.getElementById("vodCard");
const elVodPreviewImg=document.getElementById("vodPreviewImg");
const elVodHeading=document.querySelector(".vod-heading");
let SHOW_TIME=true;

elTitle.textContent = meta.title || "—";
elChannel.textContent = meta.channel || "—";

function updateMainTimeButton(){
  elToggleTime.classList.toggle("is-active", SHOW_TIME);
  elToggleTime.classList.toggle("is-inactive", !SHOW_TIME);
  elToggleTime.setAttribute("aria-pressed", SHOW_TIME ? "true" : "false");
}

function fitVodTitle(){
  if(!elTitle) return;
  const maxLines = 3;
  const minFont = 12;
  const maxFont = 15;

  elTitle.style.fontSize = `${maxFont}px`;
  elTitle.classList.remove("is-truncated");

  const cs = getComputedStyle(elTitle);
  const lineHeight = parseFloat(cs.lineHeight) || (parseFloat(cs.fontSize) * 1.22) || 18;
  const maxHeight = lineHeight * maxLines + 1;

  let size = maxFont;
  while(size > minFont && elTitle.scrollHeight > maxHeight){
    size -= 0.5;
    elTitle.style.fontSize = `${size}px`;
  }

  if(elTitle.scrollHeight > maxHeight){
    elTitle.classList.add("is-truncated");
  }
}

updateMainTimeButton();

function openVod(){
  if(meta.vod_url){
    window.open(meta.vod_url,"_blank");
  }
}

elVodCard.addEventListener("click", openVod);
elVodCard.addEventListener("keydown",(e)=>{
  if(e.key==="Enter" || e.key===" "){
    e.preventDefault();
    openVod();
  }
});

const previewUrl = meta.thumbnail_url || "";

if(previewUrl){
  elVodPreviewImg.src = previewUrl;
  elVodPreviewImg.style.display = "block";
  elVodPreviewImg.addEventListener("error", ()=>{
    elVodPreviewImg.style.display = "none";
  }, { once: true });
}else{
  elVodPreviewImg.style.display = "none";
}

requestAnimationFrame(fitVodTitle);
window.addEventListener("resize", ()=>requestAnimationFrame(fitVodTitle));
if(elVodHeading && "ResizeObserver" in window){
  const ro = new ResizeObserver(()=>requestAnimationFrame(fitVodTitle));
  ro.observe(elVodHeading);
}

function fmtStreamStart(iso){
  if(!iso) return null;
  try{
    const d = new Date(iso);
    if (Number.isNaN(d.getTime())) return null;
    const y = d.getUTCFullYear();
    const m = String(d.getUTCMonth()+1).padStart(2,"0");
    const dd = String(d.getUTCDate()).padStart(2,"0");
    const hh = String(d.getUTCHours()).padStart(2,"0");
    const mm = String(d.getUTCMinutes()).padStart(2,"0");
    return `${y}-${m}-${dd} ${hh}:${mm} UTC`;
  }catch(e){ return null; }
}
const streamStart = fmtStreamStart(meta.created_at);
if(streamStart){ elStreamDate.textContent = streamStart; elStreamDateWrap.style.display = ""; }

const DEFAULT_COLORS = [
  "#FF0000",
  "#0000FF",
  "#00FF00",
  "#B22222",
  "#FF7F50",
  "#9ACD32",
  "#FF4500",
  "#2E8B57",
  "#DAA520",
  "#D2691E",
  "#5F9EA0",
  "#1E90FF",
  "#FF69B4",
  "#8A2BE2",
  "#00FF7F",
];

function colorForUser(name){
  const u = String(name || "");
  if(!u) return "#adadb8";
  const first = u.charCodeAt(0) || 0;
  const last = u.charCodeAt(u.length - 1) || 0;
  return DEFAULT_COLORS[(first + last) % DEFAULT_COLORS.length];
}
function badgeKey(setId, version){
  const sid = String(setId || "").trim().toLowerCase();
  const ver = String(version || "").trim();
  return sid && ver ? `${sid}/${ver}` : "";
}

function renderBadges(el, badges){
  if(!Array.isArray(badges) || badges.length === 0) return false;

  let rendered = false;
  const wrap = document.createElement("span");
  wrap.className = "badges";

  for(const badge of badges){
    if(!badge || typeof badge !== "object") continue;

    const setId = badge.set_id || badge.setID;
    const version = badge.version;

    const key = `${String(setId).toLowerCase()}/${String(version)}`;
    const src = BADGE_IMAGES[key];

    if(!src) continue;

    const img = document.createElement("img");
    img.className = "badge";
    img.src = src;
    img.alt = key;

    wrap.appendChild(img);
    rendered = true;
  }

  if(rendered){
    el.appendChild(wrap);
  }

  return rendered;
}


async function fetch7tvEmotes(channelId){
  if(!channelId) return new Map();
  try{
    const r = await fetch(`https://7tv.io/v3/users/twitch/${channelId}`);
    if(!r.ok) return new Map();
    const json = await r.json();
    const emotes = json?.emote_set?.emotes || [];
    const map = new Map();
    for(const e of emotes){
      const name = e?.name;
      const host = e?.data?.host;
      if(!name||!host) continue;
      const files = host.files || [];
      const file = files.find(f=>f.name==="1x.webp")||files.find(f=>String(f.name).endsWith(".webp"))||files[0];
      if(!file) continue;
      map.set(name,`https:${host.url}/${file.name}`);
    }
    return map;
  }catch(e){ return new Map(); }
}

function renderTextWithEmotes(el,text,emotes){
  const parts = String(text||"").split(/(\s+)/);
  for(const p of parts){
  const clean = p.replace(/[\u200B-\u200D\uFEFF]/g,'').replace(/[\r\n\t]/g,'');
    if(LOCAL_EMOTES[clean] || CDN_EMOTES[clean]){
      const src = LOCAL_EMOTES[clean] || CDN_EMOTES[clean];
      const img = document.createElement("img");
      img.src = src; img.crossOrigin="anonymous"; img.alt=p; img.title=p; img.className="emote"; el.appendChild(img);
    } else if(emotes.has(clean)){
      const img = document.createElement("img");
      img.src = emotes.get(clean); img.crossOrigin="anonymous"; img.alt=p; img.title=p; img.className="emote"; el.appendChild(img);
    } else {
      el.appendChild(document.createTextNode(p));
    }
  }
}

function renderFragmentsWithEmotes(el, fragments, emotes){
  if(!Array.isArray(fragments) || fragments.length === 0){
    return false;
  }

  let renderedAny = false;
  for(const fragment of fragments){
    if(!fragment || typeof fragment !== "object") continue;

    const rawText = String(fragment.text || "");
    const cleanText = rawText
      .replace(/[\u200B-\u200D\uFEFF]/g,'')
      .replace(/[\r\n\t]/g,'')
      .trim();
    const emoteId = fragment.emoteID || (fragment.emote && (fragment.emote.emoteID || fragment.emote.id)) || null;

    if(emoteId){
      const img = document.createElement("img");
      img.src = `https://static-cdn.jtvnw.net/emoticons/v2/${emoteId}/default/dark/1.0`;
      img.crossOrigin="anonymous";
      img.alt = rawText || emoteId;
      img.title = rawText || emoteId;
      img.className="emote";
      el.appendChild(img);
      renderedAny = true;
      continue;
    }

    if(cleanText && (LOCAL_EMOTES[cleanText] || CDN_EMOTES[cleanText])){
      const src = LOCAL_EMOTES[cleanText] || CDN_EMOTES[cleanText];
      const img = document.createElement("img");
      img.src = src; img.crossOrigin="anonymous"; img.alt=rawText; img.title=rawText; img.className="emote"; el.appendChild(img);
      renderedAny = true;
      continue;
    }

    if(rawText){
      renderTextWithEmotes(el, rawText, emotes);
      renderedAny = true;
    }
  }

  return renderedAny;
}

const CHUNK = 800;
const MAX_ROWS = 3000;

let filtered = rows;
let rendered = 0;
let EMOTES = new Map();
let EMOTES_READY = false;

async function ensureEmotesLoaded(){
  if(EMOTES_READY) return;
  EMOTES_READY = true;
  if(MODE !== "online") return;
  if(!TWITCH_CHANNEL_ID) return;
  try{
    EMOTES = await fetch7tvEmotes(TWITCH_CHANNEL_ID);
    if(rendered>0){ elList.innerHTML=""; rendered=0; renderMore(); }
  }catch(e){ EMOTES = new Map(); }
}

function matches(r,q,u){
  if(u){ if(r._u.indexOf(u)===-1) return false; }
  if(q){ if(r._t.indexOf(q)===-1) return false; }
  return true;
}

async function applyFilters(){
  ensureEmotesLoaded();
  const q=(elQ.value||"").trim().toLowerCase();
  const u=(elU.value||"").trim().toLowerCase();
  filtered = rows.filter(r=>matches(r,q,u));
  elStat.textContent = `${filtered.length} / ${rows.length}`;
  elList.innerHTML=""; rendered=0; renderMore();
}

function renderMore(){
  const end = Math.min(rendered+CHUNK, filtered.length);
  const frag = document.createDocumentFragment();
  for(let i=rendered;i<end;i++){
    const r = filtered[i];
    const rowEl = document.createElement("div");
    rowEl.dataset.id = i; rowEl.className = "row";
    const tRaw = (r.t || "00:00:00"); const tNorm = String(tRaw).replace(/\s*:\s*/g,":");
    const timeEl = document.createElement("span"); timeEl.className="time"; timeEl.textContent = tNorm;
    const nameWrap = document.createElement("span");

    renderBadges(nameWrap, r.badges || []);

    const userEl = document.createElement("span");
    userEl.className = "user";
    userEl.textContent = r.user || "—";
    userEl.style.color = String(r.color || colorForUser(r.user)).trim();

    nameWrap.appendChild(userEl);

    const colonEl = document.createElement("span");
    colonEl.className = "colon";
    colonEl.textContent = ":";
    const msgEl = document.createElement("span"); msgEl.className="msg";
    if(!renderFragmentsWithEmotes(msgEl, r.fragments || [], EMOTES)){
      renderTextWithEmotes(msgEl, r.text || "", EMOTES);
    }
    if(SHOW_TIME) rowEl.appendChild(timeEl);
    rowEl.appendChild(nameWrap);
    rowEl.appendChild(colonEl);
    rowEl.appendChild(msgEl);
    frag.appendChild(rowEl);
  }
  elList.appendChild(frag); rendered=end;

}

document.addEventListener("scroll",()=>{
  if(window._scrollThrottle) return;
  window._scrollThrottle = setTimeout(()=>{ window._scrollThrottle = null;
    const nearBottom = window.innerHeight + window.scrollY > document.body.offsetHeight - 1200;
    if(nearBottom && rendered < filtered.length) renderMore();
  },80);
});

elQ.addEventListener("input",()=>applyFilters());
elU.addEventListener("input",()=>applyFilters());
elToggleTime.addEventListener("click",()=>{
  SHOW_TIME = !SHOW_TIME;
  updateMainTimeButton();
  elList.innerHTML=""; rendered=0; renderMore();
});

/* snapshot logic kept intact (uses html2canvas included below) */
let SNAPSHOT_TIME_ENABLED = SHOW_TIME;
let SNAPSHOT_DATE_ENABLED = false;
let SNAPSHOT_RENDER_TOKEN = 0;
let SNAPSHOT_OVERLAY = null;
let SNAPSHOT_PREVIEW_IMG = null;
let SNAPSHOT_TIME_BTN = null;
let SNAPSHOT_DATE_BTN = null;

function buildSnapshotWrap(rowsToClone, includeTime, includeDate){
  const wrap = document.createElement("div");
  wrap.className = "export-wrap";
  if(!includeTime){
    wrap.classList.add("snapshot-hide-time");
  }

  for(const row of rowsToClone){
    wrap.appendChild(row.cloneNode(true));
  }

  if(includeDate){
    const metaRow = document.createElement("div");
    metaRow.className = "export-meta";
    const metaRight = document.createElement("div");
    metaRight.className = "export-meta-right";

    const dateIcon = document.createElement("span");
    dateIcon.textContent = "📅";
    const dateText = document.createElement("span");
    dateText.textContent = elStreamDate.textContent || "";

    metaRight.appendChild(dateIcon);
    metaRight.appendChild(dateText);
    metaRow.appendChild(metaRight);
    wrap.appendChild(metaRow);
  }

  return wrap;
}

async function waitImages(root){
  const imgs=[...root.querySelectorAll("img")];
  await Promise.all(imgs.map(img=> img.complete ? Promise.resolve() : new Promise(res=>{ img.onload=img.onerror=res; })));
}

async function createSnapshotDataUrl(rowsToClone, includeTime, includeDate){
  const wrap = buildSnapshotWrap(rowsToClone, includeTime, includeDate);
  document.body.appendChild(wrap);
  await new Promise(r=>setTimeout(r,50));
  await waitImages(wrap);

  let canvas;
  try{
    canvas = await html2canvas(wrap,{backgroundColor:null,useCORS:true,allowTaint:false,scale:2});
  }finally{
    if(wrap.parentNode){
      document.body.removeChild(wrap);
    }
  }

  return canvas.toDataURL("image/png");
}

function updateSnapshotTimeButton(){
  if(!SNAPSHOT_TIME_BTN) return;
  SNAPSHOT_TIME_BTN.classList.toggle("is-active", SNAPSHOT_TIME_ENABLED);
  SNAPSHOT_TIME_BTN.classList.toggle("is-inactive", !SNAPSHOT_TIME_ENABLED);
  SNAPSHOT_TIME_BTN.setAttribute("aria-pressed", SNAPSHOT_TIME_ENABLED ? "true" : "false");
}

function updateSnapshotDateButton(){
  if(!SNAPSHOT_DATE_BTN) return;
  SNAPSHOT_DATE_BTN.classList.toggle("is-active", SNAPSHOT_DATE_ENABLED);
  SNAPSHOT_DATE_BTN.classList.toggle("is-inactive", !SNAPSHOT_DATE_ENABLED);
  SNAPSHOT_DATE_BTN.setAttribute("aria-pressed", SNAPSHOT_DATE_ENABLED ? "true" : "false");
}

async function rerenderSnapshotPreview(rowsToClone){
  const token = ++SNAPSHOT_RENDER_TOKEN;
  if(SNAPSHOT_PREVIEW_IMG){
    SNAPSHOT_PREVIEW_IMG.style.opacity = "0.55";
  }

  try{
    const url = await createSnapshotDataUrl(rowsToClone, SNAPSHOT_TIME_ENABLED, SNAPSHOT_DATE_ENABLED);
    if(token !== SNAPSHOT_RENDER_TOKEN) return;
    if(SNAPSHOT_PREVIEW_IMG){
      SNAPSHOT_PREVIEW_IMG.src = url;
      SNAPSHOT_PREVIEW_IMG.style.opacity = "1";
    }
  }catch(err){
    if(token !== SNAPSHOT_RENDER_TOKEN) return;
    console.error("PNG render error:", err);
    if(SNAPSHOT_PREVIEW_IMG){
      SNAPSHOT_PREVIEW_IMG.style.opacity = "1";
    }
    const msg = String(err).toLowerCase();
    if(msg.includes("size")||msg.includes("dimension")||msg.includes("height")) alert("Слишком большой фрагмент. Браузер не смог создать изображение.");
    else alert("Ошибка создания изображения. Попробуйте уменьшить фрагмент.");
  }
}

function openSnapshotOverlay(rowsToClone){
  if(SNAPSHOT_OVERLAY){
    SNAPSHOT_OVERLAY.remove();
    SNAPSHOT_OVERLAY = null;
    SNAPSHOT_PREVIEW_IMG = null;
    SNAPSHOT_TIME_BTN = null;
    SNAPSHOT_DATE_BTN = null;
  }

  SNAPSHOT_TIME_ENABLED = SHOW_TIME;
  SNAPSHOT_DATE_ENABLED = false;

  const overlay = document.createElement("div");
  overlay.className = "snapshot-overlay";

  const panel = document.createElement("div");
  panel.className = "snapshot-panel";

  const img = document.createElement("img");
  img.className = "snapshot-preview";
  img.alt = "Снимок чата";

  const actions = document.createElement("div");
  actions.className = "snapshot-actions";

  const timeBtn = document.createElement("button");
  timeBtn.type = "button";
  timeBtn.className = "snapshot-toggle";
  timeBtn.textContent = "⏱ Время";
  timeBtn.addEventListener("click", async (e)=>{
    e.stopPropagation();
    SNAPSHOT_TIME_ENABLED = !SNAPSHOT_TIME_ENABLED;
    updateSnapshotTimeButton();
    await rerenderSnapshotPreview(rowsToClone);
  });

  const dateBtn = document.createElement("button");
  dateBtn.type = "button";
  dateBtn.className = "snapshot-toggle";
  dateBtn.textContent = "🗓 Дата";
  dateBtn.addEventListener("click", async (e)=>{
    e.stopPropagation();
    SNAPSHOT_DATE_ENABLED = !SNAPSHOT_DATE_ENABLED;
    updateSnapshotDateButton();
    await rerenderSnapshotPreview(rowsToClone);
  });

  SNAPSHOT_OVERLAY = overlay;
  SNAPSHOT_PREVIEW_IMG = img;
  SNAPSHOT_TIME_BTN = timeBtn;
  SNAPSHOT_DATE_BTN = dateBtn;
  updateSnapshotTimeButton();
  updateSnapshotDateButton();

  actions.appendChild(timeBtn);
  actions.appendChild(dateBtn);
  panel.appendChild(img);
  panel.appendChild(actions);
  overlay.appendChild(panel);

  overlay.addEventListener("click", ()=>{
    overlay.remove();
    SNAPSHOT_OVERLAY = null;
    SNAPSHOT_PREVIEW_IMG = null;
    SNAPSHOT_TIME_BTN = null;
    SNAPSHOT_DATE_BTN = null;
    document.body.style.overflow = "";
  });

  panel.addEventListener("click", (e)=>e.stopPropagation());
  document.body.style.overflow = "hidden";
  document.body.appendChild(overlay);

  rerenderSnapshotPreview(rowsToClone);
}

elExportBtn.addEventListener("click", async ()=>{
  const sel = window.getSelection();
  if(!sel || sel.rangeCount===0 || sel.toString().trim()===""){ alert("Выделите текст сообщений"); return; }
  const range = sel.getRangeAt(0);
  let node = range.startContainer; if(node.nodeType===3) node=node.parentNode;
  const startRow = node.closest(".row"); if(!startRow) return;
  node = range.endContainer; if(node.nodeType===3) node=node.parentNode;
  const endRow = node.closest(".row"); if(!endRow) return;
  const allRows = [...document.querySelectorAll("#list .row")];
  const startIndex = allRows.indexOf(startRow);
  const endIndex   = allRows.indexOf(endRow);
  if(startIndex===-1||endIndex===-1) return;
  const from = Math.min(startIndex,endIndex), to = Math.max(startIndex,endIndex);

  sel.removeAllRanges();
  const rowsToClone = allRows.slice(from, to + 1).map(row => row.cloneNode(true));
  openSnapshotOverlay(rowsToClone);
});

applyFilters();
</script>
