<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Twitch Chat Viewer</title>
<style>
:root{
  --bg:#0f0f12;
  --panel:#15151b;
  --text:#e7e7ea;
  --muted:#a6a6b0;
  --border:#2a2a35;

  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;

  --controls-w:312px; /* ширина левого блока на десктопе */
  --chat-w:515px;     /* ширина блока сообщений на десктопе */
  --gap:16px;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased}
.page{width:100%;display:flex;justify-content:center;padding:0}
.chat{
  width:100%;
  max-width:none;
  margin:0;
}

/* header / controls (mobile first) */
header{
  width:100%;
  max-width:none;
  background:#18181b;
  border-bottom:1px solid var(--border);
  padding:12px;
  box-sizing:border-box;
  position:sticky;
  top:0;
  z-index:50;
  border-radius:0;
  display:flex;
  flex-direction:column;
  gap:8px;
  align-items:stretch;
  transition:padding .2s ease, gap .2s ease;
}
.meta{
  display:flex;
  flex-direction:column;
  gap:4px;
  margin:0;
  min-width:0;
  height:100%;
}


.panel-top{
  display:grid;
  grid-template-columns:132px minmax(0,1fr);
  gap:10px;
  min-width:0;
  overflow:hidden;
  transition:max-height .25s ease, opacity .2s ease, transform .25s ease, margin .2s ease;
  max-height:1000px;
  opacity:1;
  transform:none;
}

.panel-stats{
  display:flex;
  gap:8px;
  align-items:center;
  justify-content:space-between;
  width:100%;
  min-width:0;
}

.panel-stats-main{
  display:flex;
  align-items:center;
  gap:8px;
  min-width:0;
  overflow:hidden;
}

.panel-stats-separator{
  color:var(--muted);
  flex:0 0 auto;
}

.panel-stats .pill{
  min-width:0;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.panel-actions{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
  width:100%;
  min-width:0;
}

.panel-handle{
  display:none;
  align-items:center;
  justify-content:center;
  width:120px;
  height:24px;
  border-radius:999px;
  background:#18181b;
  border:none;
  box-shadow:0 10px 24px rgba(0,0,0,.36);
  cursor:grab;
  user-select:none;
  flex:0 0 auto;
  position:relative;
}

.panel-handle span{
  display:block;
  width:42px;
  height:4px;
  border-radius:999px;
  background:rgba(255,255,255,.12);
}

.vod-heading{
  display:flex;
  align-items:flex-start;
  gap:8px;
  min-width:0;
  width:100%;
}

.vod-channel{
  flex:0 1 auto;
  max-width:min(45%, 240px);
  font-size:16px;
  font-weight:700;
  line-height:1.2;
  color:var(--text);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.vod-separator{
  flex:0 0 auto;
  color:var(--muted);
  line-height:1.25;
  transform:translateY(0.05em);
}

.vod-title{
  flex:1 1 auto;
  min-width:0;
  font-size:15px;
  font-weight:400;
  line-height:1.22;
  color:var(--text);
  display:-webkit-box;
  -webkit-line-clamp:3;
  -webkit-box-orient:vertical;
  overflow:hidden;
  word-break:break-word;
}
.vod-title.is-truncated{
  overflow:hidden;
}

.vod-card{
  margin-bottom:14px;
  border:1px solid var(--border);
  border-radius:18px;
  overflow:hidden;
  background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
  box-shadow:0 10px 30px rgba(0,0,0,.22);
  cursor:pointer;
  transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease;
}
.vod-card:hover{
  transform:translateY(-1px);
  border-color:rgba(145,70,255,0.45);
  box-shadow:0 14px 34px rgba(0,0,0,.28);
}
.vod-card:focus-visible{
  outline:2px solid rgba(145,70,255,0.65);
  outline-offset:2px;
}
.vod-card-media{
  position:relative;
  aspect-ratio:16/9;
  background:linear-gradient(135deg,#22222b,#15151b 55%, #0f0f12);
}
.vod-card-media img{
  width:100%;
  height:100%;
  display:block;
  object-fit:cover;
}
.vod-card-shade{
  position:absolute;
  inset:0;
  background:linear-gradient(180deg, rgba(0,0,0,.06) 35%, rgba(0,0,0,.7) 100%);
}
.pill{
  font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
  color:var(--muted);
  font-size:12px;
}
.controls{
  display:grid;
  grid-template-columns:repeat(6,minmax(0,1fr));
  gap:8px;
  margin-top:8px;
  width:100%;
  min-width:0;
}
.controls #q{
  grid-column:1 / span 3;
  grid-row:1;
}

.controls #u{
  grid-column:4 / span 3;
  grid-row:1;
}


.controls-footer{
  grid-column:1 / span 6;
  grid-row:3;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
  width:100%;
  min-width:0;
}
.controls-footer .pill{
  min-width:0;
  overflow-wrap:anywhere;
  word-break:break-word;
}

.controls input{
  min-width:0;
  height:36px;
  padding:6px 12px;
  border-radius:10px;
  background:var(--panel);
  border:1px solid var(--border);
  color:var(--text);
  font-size:13px;
}
.button-toggle.active{
  background:var(--panel);
  border-color:var(--border);
}

.toggle-button{
  background:var(--panel);
  border:1px solid var(--border);
}

.toggle-button.is-active{
  background:var(--panel);
  border-color:var(--border);
}

.toggle-button.is-inactive{
  background:var(--panel);
  border-color:var(--border);
}

.meta-buttons{
  display:flex;
  gap:6px;
}

.meta-buttons button{
  flex:1;
  height:36px;
  font-size:13px;
  border-radius:10px;
  background:var(--panel);
  border:1px solid var(--border);
  color:var(--text);
  cursor:pointer;
}

.meta-buttons button:hover{
  border-color:var(--border);
  background:var(--panel);
}

.snapshot-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  padding:20px;
}

.snapshot-panel{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:10px;
  max-width:100%;
}

.snapshot-preview{
  max-width:min(100%, 1200px);
  max-height:min(80vh, 900px);
  border-radius:12px;
  box-shadow:0 10px 40px rgba(0,0,0,.6);
  display:block;
}

.snapshot-actions{
  display:flex;
  justify-content:flex-end;
  gap:8px;
  width:100%;
}

.snapshot-toggle{
  height:36px;
  padding:0 14px;
  border-radius:10px;
  background:var(--panel);
  border:1px solid var(--border);
  color:var(--text);
  cursor:pointer;
}

.snapshot-toggle:hover{
  background:var(--panel);
  border-color:var(--border);
}

.snapshot-toggle.is-active{
  background:var(--panel);
  border-color:var(--border);
}

.snapshot-toggle.is-inactive{
  background:var(--panel);
  border-color:var(--border);
}

/* message list */
#list{
  width:100%;
  max-width:390px;
  margin-left:auto;
  margin-right:auto;
  background:#1f1f23;
  min-height:100vh;
  padding-bottom:40px;
  margin-top:0;
  border-radius:0;
  overflow-x:hidden;
}

/* row */
.row{
  padding:6px 12px;
  line-height:1.4;
  overflow-wrap:anywhere;
}
.time{
  color:#adadb8;
  white-space:nowrap;
  margin-right:6px;
}
.user{
  font-weight:600;
  white-space:normal;
  overflow-wrap:anywhere;
  word-break:break-word;
  min-width:0;
}
.colon{
  color:var(--text);
  margin-right:6px;          /* пространство между ':' и началом сообщения */
}
.msg{
  display:inline;
  color:var(--text);
  overflow-wrap:anywhere;
  word-break:break-word;
  min-width:0;
}
.badges{
  display:inline-flex;
  align-items:center;
  gap:2px;
  margin-right:4px;
  vertical-align:middle;
  flex:0 0 auto;
}
.badge{
  width:18px;
  height:18px;
  display:inline-block;
  vertical-align:middle;
  object-fit:contain;
  image-rendering:auto;
}
.emote{vertical-align:middle;margin:0 2px}

/* export helper (unchanged) */
.export-wrap{position:fixed;left:-99999px;top:0;width:390px;background:#18181f;padding:24px}
.export-wrap.snapshot-hide-time .time{
  display:none !important;
}
.export-meta{display:flex;justify-content:space-between;align-items:center;margin-top:18px;padding-top:14px;border-top:1px solid rgba(255,255,255,.08);font-size:14px;color:#b9b9c6}

/* ===== Desktop layout ===== */
@media (min-width: 900px){
  .page{padding:24px}
  .chat{max-width: calc(var(--controls-w) + var(--chat-w) + var(--gap)); display:flex; gap:var(--gap); align-items:flex-start}

  /* left column becomes fixed-ish via sticky */
  header{
    width:var(--controls-w);
    max-width:none;
    flex:0 0 var(--controls-w);
    position:sticky;
    top:24px; /* offset from viewport top */
    border-radius:14px;
    padding:16px;
    height:fit-content;
  }

  /* make controls vertical and full width of left column */
.controls{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-top:12px;
  align-items:stretch;
}

.controls input{
  width:100%;
  height:36px;
  flex:0 0 auto;
  padding:6px 12px;
  line-height:1.2;
  font-size:13px;
}

  /* messages column */
  #list{
    width:var(--chat-w);
    max-width:var(--chat-w);
    flex:0 0 var(--chat-w);
    border-radius:14px;
    min-height:calc(100vh - 48px);
    margin-top:0; /* header is in left column, not above messages */
  }

  /* center whole layout horizontally */
  .page{justify-content:center}
}

@media (min-width: 701px){
  .panel-handle{display:none;}
}


/* small refinements for very narrow phones (so content not glued to edges) */
@media (max-width:420px){
  .chat{padding:0 8px}
  header{padding:10px;border-radius:12px}
  #list{margin-top:0;border-radius:0}
}



@media (max-width: 700px){

  #list{
    padding-top: 130px;
  }

  header{
    position:fixed;
    top:0;
    left:0;
    right:0;
    height:auto;
    padding:10px 12px 12px;
    background:#18181b;
    box-shadow:0 18px 40px rgba(0,0,0,.38);
    overflow:visible;
    z-index:80;
    display:flex;
    flex-direction:column;
    gap:8px;
    align-items:stretch;
    transform:translateY(-100px);
    transition:transform .24s ease, box-shadow .2s ease;
    will-change:transform;
    touch-action: none;
  }

  header.is-expanded{
    transform:translateY(0);
  }

  header.is-compact .panel-top,
  header.is-compact .panel-stats{
    opacity:0;
    transform:translateY(-8px);
    pointer-events:none;
  }

  header.is-expanded .panel-top,
  header.is-expanded .panel-stats{
    opacity:1;
    transform:none;
  }

  .panel-top{
    display:grid;
    grid-template-columns:132px minmax(0,1fr);
    gap:10px;
    min-width:0;
    transition:opacity .2s ease, transform .24s ease;
  }

  .panel-stats{
    display:flex;
    gap:8px;
    align-items:center;
    justify-content:space-between;
    width:100%;
    min-width:0;
    transition:opacity .2s ease, transform .24s ease;
  }

  .panel-stats .pill{
    min-width:0;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .panel-stats-channel{
    flex:1 1 auto;
  }

  .vod-card{
    margin:0;
  }

  .meta{
    margin:0;
  }

  .vod-title{
    -webkit-line-clamp:2;
    font-size:14px;
  }

  .vod-channel{
    font-size:15px;
    max-width:none;
  }

  .controls{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:8px;
    margin-top:0;
    min-width:0;
    width:100%;
  }

  .controls input{
    width:100%;
    min-width:0;
    height:36px;
    font-size:12px;
    padding:6px 12px;
  }

  .panel-actions{
    display:flex;
    flex-direction:column;
    gap:0;
    width:100%;
  }

  .meta-buttons{
    display:flex;
    gap:6px;
    width:100%;
    min-width:0;
  }

  .meta-buttons button{
    flex:1 1 0;
    height:34px;
    font-size:12px;
    box-shadow:0 8px 20px rgba(0,0,0,.24);
  }

.panel-handle{
  position:absolute;
  left:50%;
  bottom:-26px;
  transform:translateX(-50%);

  display:flex;
  width:120px;
  height:22px;

  background:#18181b;

  border:1px solid var(--border); /* ← просто полная рамка */

  border-radius:10px; /* ← ВСЕ углы скруглены */

  box-shadow:0 10px 24px rgba(0,0,0,.36);

  cursor:grab;
  user-select:none;
  touch-action:none;

  z-index:10;

  align-items:center;
  justify-content:center;
  }

  .panel-handle span{
    display:block;
    width:46px;
    height:4px;
    border-radius:999px;
    background: rgba(255,255,255,0.22);
  }

  .panel-handle.is-dragging{
  cursor:grabbing;
  transform:translateX(-50%) scale(0.96);
  }
  header.is-dragging{
  transition:none !important;
  }

  .panel-handle::before{
    content:"";
    position:absolute;
    left:-40px;
    right:-40px;
    top:-20px;
    bottom:-20px;
  }

}
</style>

</head>
<body>
<div class="page">
  <div class="chat">

    <header>
      <div class="panel-top">
        <div class="vod-card" id="vodCard" tabindex="0" role="button" aria-label="Открыть VOD">
          <div class="vod-card-media">
            <img id="vodPreviewImg" alt="" loading="eager" decoding="async" />
            <div class="vod-card-shade"></div>
          </div>
        </div>

        <div class="meta">
          <div class="vod-heading">
            <span id="title" class="vod-title">—</span>
          </div>
        </div>
      </div>

      <div class="panel-stats">
        <div class="panel-stats-main">
          <span class="pill panel-stats-channel" id="mobileChannel">—</span>
          <span class="panel-stats-separator" aria-hidden="true">•</span>
          <span class="pill">
            <span id="streamDateWrap" style="display:none"><span id="streamDate">—</span></span>
          </span>
        </div>
        <span class="pill" id="stat">—</span>
      </div>

      <div class="controls">
        <input id="q" placeholder="Поиск по сообщениям…"/>
        <input id="u" placeholder="Фильтр по нику…"/>
      </div>

      <div class="panel-actions">
  <div class="meta-buttons">
    <button id="exportBtn" class="button-toggle active">📸 Снимок</button>
    <button id="toggleTime" class="toggle-button is-active" aria-pressed="true">⏱️ Время</button>
  </div>
  <div class="panel-handle" id="panelHandle" aria-hidden="true"><span></span></div>
</div>
    </header>

    <div id="list"></div>

  </div>
</div>

<script id="chat-data" type="application/json">{{CHAT_DATA_JSON}}</script>

<script>
/* DOM is shared by two layouts:
   desktop = sticky sidebar, mobile = 2-column header grid. */


const DATA = JSON.parse(document.getElementById("chat-data").textContent || "{}");
const meta = DATA.meta || {};
const rows = DATA.rows || [];
for(const r of rows){
  r._u = (r.user || "").toLowerCase();
  r._t = (r.text || "").toLowerCase();
}

const MODE = meta.mode || "online";
const LOCAL_EMOTES = meta.local_emotes || {};
const CDN_EMOTES = meta.cdn_emotes || {};
const BADGE_IMAGES = meta.badge_images || {};
const TWITCH_CHANNEL_ID = meta.channel_id || null;

const elTitle=document.getElementById("title");
const elStat=document.getElementById("stat");
const elMobileChannel=document.getElementById("mobileChannel");
const elList=document.getElementById("list");

const elStreamDate=document.getElementById("streamDate");
const elStreamDateWrap=document.getElementById("streamDateWrap");

const elQ=document.getElementById("q");
const elU=document.getElementById("u");
const elToggleTime=document.getElementById("toggleTime");
const elExportBtn=document.getElementById("exportBtn");
const elPanelHandle=document.getElementById("panelHandle");
const MOBILE_MQ = window.matchMedia("(max-width: 700px)");
const elHeader=document.querySelector("header");
const elVodCard=document.getElementById("vodCard");
const elVodPreviewImg=document.getElementById("vodPreviewImg");
const elVodHeading=document.querySelector(".vod-heading");
let SHOW_TIME=true;
let PANEL_EXPANDED = window.matchMedia("(min-width: 701px)").matches;

elTitle.textContent = meta.title || "—";
if(elMobileChannel) elMobileChannel.textContent = meta.channel || "—";

function updateMainTimeButton(){
  elToggleTime.classList.toggle("is-active", SHOW_TIME);
  elToggleTime.classList.toggle("is-inactive", !SHOW_TIME);
  elToggleTime.setAttribute("aria-pressed", SHOW_TIME ? "true" : "false");
}

function fitVodTitle(){
  if(!elTitle) return;
  const maxLines = 3;
  const minFont = 12;
  const maxFont = 15;

  elTitle.style.fontSize = `${maxFont}px`;
  elTitle.classList.remove("is-truncated");

  const cs = getComputedStyle(elTitle);
  const lineHeight = parseFloat(cs.lineHeight) || (parseFloat(cs.fontSize) * 1.22) || 18;
  const maxHeight = lineHeight * maxLines + 1;

  let size = maxFont;
  while(size > minFont && elTitle.scrollHeight > maxHeight){
    size -= 0.5;
    elTitle.style.fontSize = `${size}px`;
  }

  if(elTitle.scrollHeight > maxHeight){
    elTitle.classList.add("is-truncated");
  }
}

updateMainTimeButton();

function clampNumber(value, min, max){
  return Math.max(min, Math.min(max, value));
}


const MOBILE_PANEL_EXPANDED = 260;
const MOBILE_PANEL_VISIBLE = 149;
const MOBILE_PANEL_OFFSET = MOBILE_PANEL_VISIBLE - MOBILE_PANEL_EXPANDED; // negative
let PANEL_DRAG = null;
let PANEL_OFFSET = MOBILE_MQ.matches ? MOBILE_PANEL_OFFSET : 0;

function clampPanelOffset(v){
  return Math.max(MOBILE_PANEL_OFFSET, Math.min(0, v));
}

function applyPanelOffset(value, animate=true){
  PANEL_OFFSET = clampPanelOffset(value);
  if(!MOBILE_MQ.matches){
    elHeader.style.transform = "";
    return;
  }
  elHeader.style.transition = animate ? "transform .24s ease, box-shadow .2s ease" : "none";
  elHeader.style.transform = `translateY(${PANEL_OFFSET}px)`;
}

function syncPanelState(expanded, animate=true){
  PANEL_EXPANDED = !!expanded;
  if(!elHeader) return;
  elHeader.classList.toggle("is-expanded", PANEL_EXPANDED);
  elHeader.classList.toggle("is-compact", !PANEL_EXPANDED);

  if(MOBILE_MQ.matches){
    applyPanelOffset(PANEL_EXPANDED ? 0 : MOBILE_PANEL_OFFSET, animate);
  }else{
    elHeader.style.transform = "";
  }
}

syncPanelState(PANEL_EXPANDED, false);

elHeader.addEventListener("pointerdown", (e)=>{
  if(!MOBILE_MQ.matches) return;

  const isInput = e.target.closest("input");

  PANEL_DRAG = {
    pointerId: e.pointerId,
    startY: e.clientY,
    startOffset: PANEL_OFFSET,
    fromInput: !!isInput,
    moved: false
  };

  elHeader.setPointerCapture(e.pointerId);
  elHeader.style.transition = "none";
  elHeader.classList.add("is-dragging");
});

elHeader.addEventListener("pointermove", (e)=>{
  if(!PANEL_DRAG || e.pointerId !== PANEL_DRAG.pointerId) return;

  const dy = e.clientY - PANEL_DRAG.startY;

  if(PANEL_DRAG.fromInput && !PANEL_DRAG.moved){
    if(Math.abs(dy) < 8) return;
    PANEL_DRAG.moved = true;
    e.preventDefault();
  } else {
    e.preventDefault();
  }

  applyPanelOffset(
    PANEL_DRAG.startOffset + dy,
    false
  );
});

elHeader.addEventListener("pointerup", (e)=>{
  if(!PANEL_DRAG || e.pointerId !== PANEL_DRAG.pointerId) return;

  elHeader.releasePointerCapture(e.pointerId);

  const threshold = MOBILE_PANEL_OFFSET * 0.6;
  const shouldExpand = PANEL_OFFSET > threshold;

  PANEL_DRAG = null;
  elHeader.classList.remove("is-dragging");

  syncPanelState(shouldExpand, true);
});

elHeader.addEventListener("pointercancel", (e)=>{
  if(!PANEL_DRAG || e.pointerId !== PANEL_DRAG.pointerId) return;

  elHeader.releasePointerCapture(e.pointerId);

  PANEL_DRAG = null;
  elHeader.classList.remove("is-dragging");
});

let TOUCH_DRAG = null;

elHeader.addEventListener("touchstart", (e)=>{
  if(!MOBILE_MQ.matches) return;

  const t = e.touches[0];

  TOUCH_DRAG = {
    startY: t.clientY,
    startOffset: PANEL_OFFSET,
    fromInput: !!e.target.closest("input"),
    moved: false
  };
}, { passive: true });

elHeader.addEventListener("touchmove", (e)=>{
  if(!TOUCH_DRAG) return;

  const t = e.touches[0];
  const dy = t.clientY - TOUCH_DRAG.startY;

  if(TOUCH_DRAG.fromInput && !TOUCH_DRAG.moved){
    if(Math.abs(dy) < 8) return;
    TOUCH_DRAG.moved = true;
  }

  e.preventDefault(); // ← КЛЮЧЕВОЕ

  applyPanelOffset(
    TOUCH_DRAG.startOffset + dy,
    false
  );
}, { passive: false });

elHeader.addEventListener("touchend", ()=>{
  if(!TOUCH_DRAG) return;

  const threshold = MOBILE_PANEL_OFFSET * 0.6;
  const shouldExpand = PANEL_OFFSET > threshold;

  TOUCH_DRAG = null;
  syncPanelState(shouldExpand, true);
});

elHeader.addEventListener("touchcancel", ()=>{
  TOUCH_DRAG = null;
});

window.addEventListener("resize", ()=>{
  requestAnimationFrame(fitVodTitle);
  syncPanelState(PANEL_EXPANDED, false);
});

elVodCard.addEventListener("keydown",(e)=>{

function fmtStreamStart(iso){
  if(!iso) return null;
  try{
    const d = new Date(iso);
    if (Number.isNaN(d.getTime())) return null;
    const y = d.getUTCFullYear();
    const m = String(d.getUTCMonth()+1).padStart(2,"0");
    const dd = String(d.getUTCDate()).padStart(2,"0");
    const hh = String(d.getUTCHours()).padStart(2,"0");
    const mm = String(d.getUTCMinutes()).padStart(2,"0");
    return `${y}-${m}-${dd} ${hh}:${mm} UTC`;
  }catch(e){ return null; }
}
const streamStart = fmtStreamStart(meta.created_at);
if(streamStart){ elStreamDate.textContent = streamStart; elStreamDateWrap.style.display = ""; }

const DEFAULT_COLORS = [
  "#FF0000",
  "#0000FF",
  "#00FF00",
  "#B22222",
  "#FF7F50",
  "#9ACD32",
  "#FF4500",
  "#2E8B57",
  "#DAA520",
  "#D2691E",
  "#5F9EA0",
  "#1E90FF",
  "#FF69B4",
  "#8A2BE2",
  "#00FF7F",
];

function colorForUser(name){
  const u = String(name || "");
  if(!u) return "#adadb8";
  const first = u.charCodeAt(0) || 0;
  const last = u.charCodeAt(u.length - 1) || 0;
  return DEFAULT_COLORS[(first + last) % DEFAULT_COLORS.length];
}
function renderBadges(el, badges){
  if(!Array.isArray(badges) || badges.length === 0) return false;

  let rendered = false;
  const wrap = document.createElement("span");
  wrap.className = "badges";

  for(const badge of badges){
    if(!badge || typeof badge !== "object") continue;

    const setId = badge.set_id || badge.setID;
    const version = badge.version;

    const key = `${String(setId).toLowerCase()}/${String(version)}`;
    const src = BADGE_IMAGES[key];

    if(!src) continue;

    const img = document.createElement("img");
    img.className = "badge";
    img.src = src;
    img.alt = key;

    wrap.appendChild(img);
    rendered = true;
  }

  if(rendered){
    el.appendChild(wrap);
  }

  return rendered;
}


async function fetch7tvEmotes(channelId){
  if(!channelId) return new Map();
  try{
    const r = await fetch(`https://7tv.io/v3/users/twitch/${channelId}`);
    if(!r.ok) return new Map();
    const json = await r.json();
    const emotes = json?.emote_set?.emotes || [];
    const map = new Map();
    for(const e of emotes){
      const name = e?.name;
      const host = e?.data?.host;
      if(!name||!host) continue;
      const files = host.files || [];
      const file = files.find(f=>f.name==="1x.webp")||files.find(f=>String(f.name).endsWith(".webp"))||files[0];
      if(!file) continue;
      map.set(name,`https:${host.url}/${file.name}`);
    }
    return map;
  }catch(e){ return new Map(); }
}

function renderTextWithEmotes(el,text,emotes){
  const parts = String(text||"").split(/(\s+)/);
  for(const p of parts){
  const clean = p.replace(/[\u200B-\u200D\uFEFF]/g,'').replace(/[\r\n\t]/g,'');
    if(LOCAL_EMOTES[clean] || CDN_EMOTES[clean]){
      const src = LOCAL_EMOTES[clean] || CDN_EMOTES[clean];
      const img = document.createElement("img");
      img.src = src; img.crossOrigin="anonymous"; img.alt=p; img.title=p; img.className="emote"; el.appendChild(img);
    } else if(emotes.has(clean)){
      const img = document.createElement("img");
      img.src = emotes.get(clean); img.crossOrigin="anonymous"; img.alt=p; img.title=p; img.className="emote"; el.appendChild(img);
    } else {
      el.appendChild(document.createTextNode(p));
    }
  }
}

function renderFragmentsWithEmotes(el, fragments, emotes){
  if(!Array.isArray(fragments) || fragments.length === 0){
    return false;
  }

  let renderedAny = false;
  for(const fragment of fragments){
    if(!fragment || typeof fragment !== "object") continue;

    const rawText = String(fragment.text || "");
    const cleanText = rawText
      .replace(/[\u200B-\u200D\uFEFF]/g,'')
      .replace(/[\r\n\t]/g,'')
      .trim();
    const emoteId = fragment.emoteID || (fragment.emote && (fragment.emote.emoteID || fragment.emote.id)) || null;

    if(emoteId){
      const img = document.createElement("img");
      img.src = `https://static-cdn.jtvnw.net/emoticons/v2/${emoteId}/default/dark/1.0`;
      img.crossOrigin="anonymous";
      img.alt = rawText || emoteId;
      img.title = rawText || emoteId;
      img.className="emote";
      el.appendChild(img);
      renderedAny = true;
      continue;
    }

    if(cleanText && (LOCAL_EMOTES[cleanText] || CDN_EMOTES[cleanText])){
      const src = LOCAL_EMOTES[cleanText] || CDN_EMOTES[cleanText];
      const img = document.createElement("img");
      img.src = src; img.crossOrigin="anonymous"; img.alt=rawText; img.title=rawText; img.className="emote"; el.appendChild(img);
      renderedAny = true;
      continue;
    }

    if(rawText){
      renderTextWithEmotes(el, rawText, emotes);
      renderedAny = true;
    }
  }

  return renderedAny;
}

const CHUNK = 800;
function createRowElement(r, includeTime, rowIndex){
  const rowEl = document.createElement("div");
  if(rowIndex !== undefined && rowIndex !== null){
    rowEl.dataset.id = String(rowIndex);
  }
  rowEl.className = "row";
  const tRaw = (r.t || "00:00:00");
  const tNorm = String(tRaw).replace(/\s*:\s*/g,":");
  if(includeTime){
    const timeEl = document.createElement("span");
    timeEl.className = "time";
    timeEl.textContent = tNorm;
    rowEl.appendChild(timeEl);
  }

  const nameWrap = document.createElement("span");
  renderBadges(nameWrap, r.badges || []);

  const userEl = document.createElement("span");
  userEl.className = "user";
  userEl.textContent = r.user || "—";
  userEl.style.color = String(r.color || colorForUser(r.user)).trim();
  nameWrap.appendChild(userEl);

  const colonEl = document.createElement("span");
  colonEl.className = "colon";
  colonEl.textContent = ":";
  const msgEl = document.createElement("span");
  msgEl.className = "msg";
  if(!renderFragmentsWithEmotes(msgEl, r.fragments || [], EMOTES)){
    renderTextWithEmotes(msgEl, r.text || "", EMOTES);
  }
  rowEl.appendChild(nameWrap);
  rowEl.appendChild(colonEl);
  rowEl.appendChild(msgEl);
  return rowEl;
}


/* Rows are appended in chunks so huge chats do not freeze the page. */
let filtered = rows;
let rendered = 0;
let EMOTES = new Map();
let EMOTES_READY = false;

async function ensureEmotesLoaded(){
  if(EMOTES_READY) return;
  EMOTES_READY = true;
  if(MODE !== "online") return;
  if(!TWITCH_CHANNEL_ID) return;
  try{
    EMOTES = await fetch7tvEmotes(TWITCH_CHANNEL_ID);
    if(rendered>0){ elList.innerHTML=""; rendered=0; renderMore(); }
  }catch(e){ EMOTES = new Map(); }
}

function matches(r,q,u){
  if(u){ if(r._u.indexOf(u)===-1) return false; }
  if(q){ if(r._t.indexOf(q)===-1) return false; }
  return true;
}

async function applyFilters(){
  ensureEmotesLoaded();
  const q=(elQ.value||"").trim().toLowerCase();
  const u=(elU.value||"").trim().toLowerCase();
  filtered = rows.filter(r=>matches(r,q,u));
  elStat.textContent = `${filtered.length} / ${rows.length}`;
  elList.innerHTML=""; rendered=0; renderMore();
}

function renderMore(){
  const end = Math.min(rendered+CHUNK, filtered.length);
  const frag = document.createDocumentFragment();
  for(let i=rendered;i<end;i++){
    frag.appendChild(createRowElement(filtered[i], SHOW_TIME, i));
  }
  elList.appendChild(frag);
  rendered=end;
}

document.addEventListener("scroll",()=>{
  if(window._scrollThrottle) return;
  window._scrollThrottle = setTimeout(()=>{ window._scrollThrottle = null;
    const nearBottom = window.innerHeight + window.scrollY > document.body.offsetHeight - 1200;
    if(nearBottom && rendered < filtered.length) renderMore();
  },80);
});

elQ.addEventListener("input",()=>applyFilters());
elU.addEventListener("input",()=>applyFilters());
elToggleTime.addEventListener("click",(e)=>{
  e.stopPropagation();
  SHOW_TIME = !SHOW_TIME;
  updateMainTimeButton();
  elList.innerHTML=""; rendered=0; renderMore();
});

/* Snapshot overlay: clone visible rows and render a fresh PNG every toggle. */
let SNAPSHOT_TIME_ENABLED = SHOW_TIME;
let SNAPSHOT_DATE_ENABLED = false;
let SNAPSHOT_RENDER_TOKEN = 0;
let SNAPSHOT_OVERLAY = null;
let SNAPSHOT_PREVIEW_IMG = null;
let SNAPSHOT_TIME_BTN = null;
let SNAPSHOT_DATE_BTN = null;

function buildSnapshotWrap(rowsToUse, includeTime, includeDate){
  const wrap = document.createElement("div");
  wrap.className = "export-wrap";
  if(!includeTime){
    wrap.classList.add("snapshot-hide-time");
  }

  rowsToUse.forEach((r, idx)=>{
    wrap.appendChild(createRowElement(r, includeTime, idx));
  });

  if(includeDate){
    const metaRow = document.createElement("div");
    metaRow.className = "export-meta";
    const metaRight = document.createElement("div");
    metaRight.className = "export-meta-right";

    const dateIcon = document.createElement("span");
    dateIcon.textContent = "📅";
    const dateText = document.createElement("span");
    dateText.textContent = elStreamDate.textContent || "";

    metaRight.appendChild(dateIcon);
    metaRight.appendChild(dateText);
    metaRow.appendChild(metaRight);
    wrap.appendChild(metaRow);
  }

  return wrap;
}

async function waitImages(root){
  const imgs=[...root.querySelectorAll("img")];
  await Promise.all(imgs.map(img=> img.complete ? Promise.resolve() : new Promise(res=>{ img.onload=img.onerror=res; })));
}

async function createSnapshotDataUrl(rowsToClone, includeTime, includeDate){
  const wrap = buildSnapshotWrap(rowsToClone, includeTime, includeDate);
  document.body.appendChild(wrap);
  await new Promise(r=>setTimeout(r,50));
  await waitImages(wrap);

  let canvas;
  try{
    canvas = await html2canvas(wrap,{backgroundColor:null,useCORS:true,allowTaint:false,scale:2});
  }finally{
    if(wrap.parentNode){
      document.body.removeChild(wrap);
    }
  }

  return canvas.toDataURL("image/png");
}

const nextFrame = () => new Promise(requestAnimationFrame);

function updateSnapshotTimeButton(){
  if(!SNAPSHOT_TIME_BTN) return;
  SNAPSHOT_TIME_BTN.classList.toggle("is-active", SNAPSHOT_TIME_ENABLED);
  SNAPSHOT_TIME_BTN.classList.toggle("is-inactive", !SNAPSHOT_TIME_ENABLED);
  SNAPSHOT_TIME_BTN.setAttribute("aria-pressed", SNAPSHOT_TIME_ENABLED ? "true" : "false");
}

function updateSnapshotDateButton(){
  if(!SNAPSHOT_DATE_BTN) return;
  SNAPSHOT_DATE_BTN.classList.toggle("is-active", SNAPSHOT_DATE_ENABLED);
  SNAPSHOT_DATE_BTN.classList.toggle("is-inactive", !SNAPSHOT_DATE_ENABLED);
  SNAPSHOT_DATE_BTN.setAttribute("aria-pressed", SNAPSHOT_DATE_ENABLED ? "true" : "false");
}

async function rerenderSnapshotPreview(rowsToClone){
  const token = ++SNAPSHOT_RENDER_TOKEN;
  if(SNAPSHOT_PREVIEW_IMG){
    SNAPSHOT_PREVIEW_IMG.style.opacity = "0.55";
  }

  try{
    const url = await createSnapshotDataUrl(rowsToClone, SNAPSHOT_TIME_ENABLED, SNAPSHOT_DATE_ENABLED);
    if(token !== SNAPSHOT_RENDER_TOKEN) return;
    if(SNAPSHOT_PREVIEW_IMG){
      SNAPSHOT_PREVIEW_IMG.src = url;
      SNAPSHOT_PREVIEW_IMG.style.opacity = "1";
    }
  }catch(err){
    if(token !== SNAPSHOT_RENDER_TOKEN) return;
    console.error("PNG render error:", err);
    if(SNAPSHOT_PREVIEW_IMG){
      SNAPSHOT_PREVIEW_IMG.style.opacity = "1";
    }
    const msg = String(err).toLowerCase();
    if(msg.includes("size")||msg.includes("dimension")||msg.includes("height")) alert("Слишком большой фрагмент. Браузер не смог создать изображение.");
    else alert("Ошибка создания изображения. Попробуйте уменьшить фрагмент.");
  }
}

function openSnapshotOverlay(rowsToClone){
  if(SNAPSHOT_OVERLAY){
    SNAPSHOT_OVERLAY.remove();
    SNAPSHOT_OVERLAY = null;
    SNAPSHOT_PREVIEW_IMG = null;
    SNAPSHOT_TIME_BTN = null;
    SNAPSHOT_DATE_BTN = null;
  }

  SNAPSHOT_TIME_ENABLED = SHOW_TIME;
  SNAPSHOT_DATE_ENABLED = false;

  const overlay = document.createElement("div");
  overlay.className = "snapshot-overlay";

  const panel = document.createElement("div");
  panel.className = "snapshot-panel";

  const img = document.createElement("img");
  img.className = "snapshot-preview";
  img.alt = "Снимок чата";

  const actions = document.createElement("div");
  actions.className = "snapshot-actions";

  const timeBtn = document.createElement("button");
  timeBtn.type = "button";
  timeBtn.className = "snapshot-toggle";
  timeBtn.textContent = "⏱ Время";
  timeBtn.addEventListener("click", async (e)=>{
    e.stopPropagation();
    SNAPSHOT_TIME_ENABLED = !SNAPSHOT_TIME_ENABLED;
    updateSnapshotTimeButton();
    await nextFrame();
    await rerenderSnapshotPreview(rowsToClone);
  });

  const dateBtn = document.createElement("button");
  dateBtn.type = "button";
  dateBtn.className = "snapshot-toggle";
  dateBtn.textContent = "🗓 Дата";
  dateBtn.addEventListener("click", async (e)=>{
    e.stopPropagation();
    SNAPSHOT_DATE_ENABLED = !SNAPSHOT_DATE_ENABLED;
    updateSnapshotDateButton();
    await nextFrame();
    await rerenderSnapshotPreview(rowsToClone);
  });

  SNAPSHOT_OVERLAY = overlay;
  SNAPSHOT_PREVIEW_IMG = img;
  SNAPSHOT_TIME_BTN = timeBtn;
  SNAPSHOT_DATE_BTN = dateBtn;
  updateSnapshotTimeButton();
  updateSnapshotDateButton();

  actions.appendChild(timeBtn);
  actions.appendChild(dateBtn);
  panel.appendChild(img);
  panel.appendChild(actions);
  overlay.appendChild(panel);

  overlay.addEventListener("click", ()=>{
    overlay.remove();
    SNAPSHOT_OVERLAY = null;
    SNAPSHOT_PREVIEW_IMG = null;
    SNAPSHOT_TIME_BTN = null;
    SNAPSHOT_DATE_BTN = null;
    document.body.style.overflow = "";
  });

  panel.addEventListener("click", (e)=>e.stopPropagation());
  document.body.style.overflow = "hidden";
  document.body.appendChild(overlay);

  rerenderSnapshotPreview(rowsToClone);
}

elExportBtn.addEventListener("click", async (e)=>{
  e.stopPropagation();
  const sel = window.getSelection();
  if(!sel || sel.rangeCount===0 || sel.toString().trim()===""){ alert("Выделите текст сообщений"); return; }
  const range = sel.getRangeAt(0);
  let node = range.startContainer; if(node.nodeType===3) node=node.parentNode;
  const startRow = node.closest(".row"); if(!startRow) return;
  node = range.endContainer; if(node.nodeType===3) node=node.parentNode;
  const endRow = node.closest(".row"); if(!endRow) return;
  const startIndex = Number(startRow.dataset.id);
  const endIndex   = Number(endRow.dataset.id);
  if(Number.isNaN(startIndex)||Number.isNaN(endIndex)) return;
  const from = Math.min(startIndex,endIndex), to = Math.max(startIndex,endIndex);

  sel.removeAllRanges();
  const rowsToClone = filtered.slice(from, to + 1);
  openSnapshotOverlay(rowsToClone);
});

applyFilters();
</script>
