<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Chat Viewer — base</title>
<style>
:root{
  --bg:#0f0f12; --panel:#15151b; --text:#e7e7ea; --muted:#9a9aa0;
  --mono:ui-monospace,monospace; --sans:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial;
}
*{box-sizing:border-box}
body{margin:0;height:100%;font-family:var(--sans);background:var(--bg);color:var(--text)}
.app{display:flex;gap:20px;padding:18px;align-items:flex-start}
.panel{
  width:280px;
  background:#1b1b1f;
  padding:14px;
  border-radius:10px;

  position:sticky;
  top:18px;
  height:fit-content;
}
.viewer{
  flex:1;
  max-width:720px;
  background:#151517;
  padding:12px;
  border-radius:10px;

  height:calc(100vh - 36px);
  overflow-y:auto;
}
.controls{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.controls input, .controls button{height:36px;padding:6px 8px;border-radius:6px;border:0;background:#222;color:var(--text)}
#list{background:transparent}
.row{
  padding:8px 6px;
  border-bottom:1px solid rgba(255,255,255,0.03);
  font-size:14px;
  line-height:1.35;
  white-space:pre-wrap;
}
.row:hover{
  background:rgba(255,255,255,0.04);
}
.time{
  display:inline-block;
  width:64px;
  font-family:var(--mono);
  color:var(--muted);
}
.user{
  font-weight:600;
  white-space:nowrap;
}
.username{
  white-space:nowrap;
  margin-right:4px;
}

.colon{
  color:var(--text);
}
.body{
  display:inline;
}
.emote{height:22px;vertical-align:-4px;margin:0 2px}
.small{font-size:12px;color:var(--muted)}
.mention{color:#8cc7ff;font-weight:500;}
.link{
  color:#6fb3ff;
  text-decoration:none;
}

.link:hover{
  text-decoration:underline;
}
</style>
</head>
<body>
<div class="app">
  <div class="panel">
    <div class="controls">
      <input id="q" placeholder="Поиск по тексту… (q)"/>
      <input id="u" placeholder="Фильтр по нику… (u)"/>
      <button id="toggleTime">Время: ON</button>
      <button id="exportBtn">Снимок (выделение)</button>
      <button id="openVod">Открыть VOD</button>
      <button id="jumpTop">⬆️</button>
      <button id="jumpBottom">⬇️</button>
    </div>
    <div class="small" id="stat">—</div>
    <div class="small" id="emoteStat"></div>
  </div>

  <div class="viewer">
    <div id="list"></div>
  </div>
</div>

<script id="chat-data" type="application/json">{{CHAT_DATA_JSON}}</script>

<script>
/* Простая, расширяемая база. Все функции короткие и тестируемые. */

/* STATE */
const STATE = {
  rowsAll: [],
  rowsFiltered: [],
  rendered: 0,
  chunk: 200,
  emotes: new Map(),
  showTime: true,
  meta: {},
  savedPos: null,
  lastButton: null,
};

/* DOM cache */
const DOM = {
  viewer: document.querySelector(".viewer"),
  list: document.getElementById("list"),
  q: document.getElementById("q"),
  u: document.getElementById("u"),
  stat: document.getElementById("stat"),
  toggleTime: document.getElementById("toggleTime")
};

/* helpers */
function esc(s){ return (s??"").replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function colorForUser(name){ let h=0; for(let i=0;i<(name||"").length;i++) h=(h*31+name.charCodeAt(i))%360; return `hsl(${h} 70% 60%)`; }
function byFilter(row,q,u){
  if(u && (!row.user || row.user.toLowerCase().indexOf(u)===-1)) return false;
  if(q && (!row.text || row.text.toLowerCase().indexOf(q)===-1)) return false;
  return true;
}

/* load initial data */
function loadDataFromScript(){
  const raw = document.getElementById("chat-data").textContent || "{}";
  const parsed = JSON.parse(raw);
  STATE.meta = parsed.meta || {};
  STATE.rowsAll = (parsed.rows || []).map((r,i)=>({...r,__idx:i}));
  STATE.rowsFiltered = [...STATE.rowsAll];
  DOM.stat.textContent = `Показано: ${STATE.rowsFiltered.length} / ${STATE.rowsAll.length}`;
}

/* fetch 7tv emotes (simple) */
async function fetch7tvEmotes(channelId){
  if(!channelId) return new Map();
  try{
    const res = await fetch(`https://7tv.io/v3/users/twitch/${channelId}`);
    if(!res.ok) return new Map();
    const json = await res.json();
    const ems = json?.emote_set?.emotes||[];
    const map = new Map();
    for(const e of ems){
      const files = e?.data?.host?.files||[];
      const file = files.find(f=>f.name==="1x.webp")||files[0];
      if(file) map.set(e.name, `https:${e.data.host.url}/${file.name}`);
    }
    return map;
  }catch(e){ return new Map(); }
}

function parseFragments(text){
  const parts = String(text || "").split(/(\s+)/);
  const fragments = [];

  for(const p of parts){
    const token = p.replace(/[\u200B-\u200D\uFEFF]/g,'').replace(/[\r\n\t]/g,'');

    if(STATE.emotes.has(token)){
      fragments.push({type:"emote", value:token});
    }
    else if(token.startsWith("@") && token.length > 1){
      fragments.push({type:"mention", value:token});
    }
    else if(/^https?:\/\//i.test(token)){
      fragments.push({type:"link", value:token});
    }
    else{
      fragments.push({type:"text", value:p});
    }
  }

  return fragments;
}

/* render text with emotes inline */
function renderTextWithEmotes(container,text){

  const fragments = parseFragments(text);

  for(const f of fragments){

    if(f.type === "emote"){
      const img = document.createElement("img");
      img.className = "emote";
      img.src = STATE.emotes.get(f.value);
      img.alt = f.value;
      container.appendChild(img);
    }

    else if(f.type === "mention"){
      const span = document.createElement("span");
      span.className = "mention";
      span.textContent = f.value;
      container.appendChild(span);
    }

    else if(f.type === "link"){
      const a = document.createElement("a");
      a.href = f.value;
      a.textContent = f.value;
      a.target = "_blank";
      a.rel = "noopener noreferrer";
      a.className = "link";
      container.appendChild(a);
    }

    else{
      container.appendChild(document.createTextNode(f.value));
    }

  }
}

function renderTime(row){
  const t = document.createElement("span");
  t.className = "time";
  t.textContent = row.t || "00:00:00";
  return t;
}

function renderUser(row){

  const wrapper = document.createElement("span");
  wrapper.className = "username";

  const name = document.createElement("span");
  name.className = "user";
  name.textContent = row.user || "—";
  name.style.color = colorForUser(row.user);

  const colon = document.createElement("span");
  colon.className = "colon";
  colon.textContent = ":";

  wrapper.appendChild(name);
  wrapper.appendChild(colon);

  return wrapper;
}

function renderBody(row){
  const b = document.createElement("span");
  b.className = "body";

  if(row.reply_to){
    const r = document.createElement("span");
    r.className = "small";
    r.textContent = `↳ @${row.reply_to} `;
    b.appendChild(r);
  }

  renderTextWithEmotes(b, row.text || "");
  return b;
}

/* render single message DOM — keep minimal and semantic */
function renderMessage(row){
  const el = document.createElement("div");
  el.className = "row";
  el.dataset.user = row.user || "";
  el.dataset.idx = row.__idx;

  if(STATE.showTime){
    el.appendChild(renderTime(row));
  }

  el.appendChild(renderUser(row));
  el.appendChild(renderBody(row));

  return el;
}

/* chunked render */
function renderMore(){
  const list = DOM.list;
  const end = Math.min(STATE.rendered + STATE.chunk, STATE.rowsFiltered.length);
  const frag = document.createDocumentFragment();
  for(let i=STATE.rendered;i<end;i++) frag.appendChild(renderMessage(STATE.rowsFiltered[i]));
  list.appendChild(frag);
  STATE.rendered = end;
}

/* filters */
function applyFilters(){
  const q = (document.getElementById("q").value||"").trim().toLowerCase();
  const u = (document.getElementById("u").value||"").trim().toLowerCase();
  STATE.rowsFiltered = STATE.rowsAll.filter(r=>byFilter(r,q,u));
  STATE.rendered = 0;
  DOM.list.innerHTML = "";
  DOM.stat.textContent = `Показано: ${STATE.rowsFiltered.length} / ${STATE.rowsAll.length}`;
  renderMore();
}

/* snapshot selected range using html2canvas (kept simple) */
async function snapshotSelected(){
  const sel = window.getSelection();
  if(!sel || sel.rangeCount===0 || sel.toString().trim()===""){ alert("Выделите диапазон сообщений."); return; }
  const range = sel.getRangeAt(0);
  let sNode = range.startContainer; if(sNode.nodeType===3) sNode = sNode.parentNode;
  let eNode = range.endContainer; if(eNode.nodeType===3) eNode = eNode.parentNode;
  const start = sNode.closest(".row"), end = eNode.closest(".row");
  if(!start||!end) return alert("Выделите внутри списка сообщений.");
  const all = [...document.querySelectorAll("#list .row")];
  const from = all.indexOf(start), to = all.indexOf(end);
  if(from<0||to<0) return;
  const wrap = document.createElement("div"); wrap.style.padding="10px"; wrap.style.background="#111";
  for(let i=Math.min(from,to); i<=Math.max(from,to); i++){ const c = all[i].cloneNode(true); c.style.border="none"; wrap.appendChild(c); }
  document.body.appendChild(wrap);
  await new Promise(r=>setTimeout(r,60));
  await html2canvas(wrap,{backgroundColor:null,useCORS:true,scale:2}).then(canvas=>{
    const url = canvas.toDataURL("image/png");
    const w = window.open(""); w.document.body.style.margin="0"; const img = w.document.createElement("img"); img.src=url; img.style.maxWidth="100%"; w.document.body.appendChild(img);
  }).catch(e=>alert("Ошибка рендера: "+e));
  document.body.removeChild(wrap);
}

function jumpBottom(){

  const firstVisible = [...DOM.list.querySelectorAll(".row")]
    .find(r => r.getBoundingClientRect().top >= DOM.viewer.getBoundingClientRect().top);

  if(STATE.lastButton === "top" && STATE.savedPos !== null){
    const target = DOM.list.querySelector(`.row[data-idx="${STATE.savedPos}"]`);
    if(target){
      target.scrollIntoView({block:"start"});
      STATE.lastButton = "bottom";
      return;
    }
  }

  if(STATE.savedPos === null && firstVisible){
    STATE.savedPos = Number(firstVisible.dataset.idx);
  }

  while(STATE.rendered < STATE.rowsFiltered.length){
    renderMore();
  }

  DOM.viewer.scrollTop = DOM.viewer.scrollHeight;

  if(STATE.lastButton === "bottom"){
    STATE.savedPos = null;
  }

  STATE.lastButton = "bottom";
}

function jumpTop(){

  if(STATE.lastButton === "bottom" && STATE.savedPos !== null){
    const target = DOM.list.querySelector(`.row[data-idx="${STATE.savedPos}"]`);
    if(target){
      target.scrollIntoView({block:"start"});
      STATE.lastButton = "top";
      return;
    }
  }

  DOM.viewer.scrollTop = 0;

  if(STATE.lastButton === "top"){
    STATE.savedPos = null;
  }

  STATE.lastButton = "top";
}

/* init */
async function init(){

  loadDataFromScript();

  if(STATE.meta.channel_id){
    const el = document.getElementById("emoteStat");
    el.textContent = "Загрузка эмоутов…";

    STATE.emotes = await fetch7tvEmotes(STATE.meta.channel_id);

    el.textContent = "";
  }

  DOM.q.addEventListener("input",()=>applyFilters());
  DOM.u.addEventListener("input",()=>applyFilters());
  document.getElementById("toggleTime").addEventListener("click",()=>{
    STATE.showTime = !STATE.showTime;
    DOM.toggleTime.textContent = `Время: ${STATE.showTime? 'ON':'OFF'}`;
    DOM.list.innerHTML = ""; STATE.rendered = 0; renderMore();
  });
  document.getElementById("exportBtn").addEventListener("click", snapshotSelected);
  document.getElementById("openVod").addEventListener("click", ()=>{ if(STATE.meta.vod_url) window.open(STATE.meta.vod_url,"_blank"); else alert("нет vod_url в meta"); });
  document.getElementById("jumpBottom").addEventListener("click", jumpBottom);
  document.getElementById("jumpTop").addEventListener("click", jumpTop);
  // infinite scroll loader
  DOM.viewer.addEventListener("scroll", ()=>{
    if(DOM.viewer.scrollTop + DOM.viewer.clientHeight > DOM.viewer.scrollHeight - 400) renderMore(); });

  // initial render
  renderMore();
}

/* expose for debugging if needed */
window.__STATE = STATE;

init();
</script>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</body>
</html>
