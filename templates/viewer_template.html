<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Twitch Chat Viewer</title>
<style>
:root{
  --bg:#0f0f12;
  --panel:#15151b;
  --text:#e7e7ea;
  --muted:#a6a6b0;
  --border:#2a2a35;
  --accent:#9146ff;

  --rowA:#1f232a;
  --rowB:#232830;

  --mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;

  --controls-w:260px; /* ширина левого блока на десктопе */
  --chat-w:520px;     /* ширина блока сообщений на десктопе */
  --gap:24px;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased}
.page{width:100%;display:flex;justify-content:center;padding:0}
.chat{
  width:100%;
  max-width:none;
  margin:0;
}

/* header / controls (mobile first) */
header{
  width:100%;
  max-width:none;
  background:#18181b;
  border-bottom:1px solid var(--border);
  padding:12px;
  box-sizing:border-box;
  position:sticky;
  top:0;
  z-index:50;
  border-radius:0;
}
.meta{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
.pill{font-family:var(--mono);color:var(--muted);font-size:12px}
/* Заменить текущие .controls и позиции #q,#u,#vodBtn,#exportBtn,#toggleTime,#toggleTag (mobile) */
.controls{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-top:8px;
  width:100%;
}

/* inputs occupy top row (по 2 колонки каждый) */
.controls #q{ grid-column:1 / span 2; grid-row:1; }
.controls #u{ grid-column:3 / span 2; grid-row:1; }

/* кнопки — в единой строке по 4 равные колонки (row 2) */
.controls #toggleTag{ grid-column:1 / span 1; grid-row:2; }
.controls #toggleTime{ grid-column:2 / span 1; grid-row:2; }
.controls #vodBtn{ grid-column:3 / span 1; grid-row:2; }
.controls #exportBtn{ grid-column:4 / span 1; grid-row:2; }

/* статистика — строка 3, занимает всю ширину справа */
.controls #stat{ grid-column:1 / span 4; grid-row:3; justify-self:end; }

/* message list */
#list{
  width:100%;
  max-width:390px;
  margin-left:auto;
  margin-right:auto;
  background:#1f1f23;
  min-height:100vh;
  padding-bottom:40px;
  margin-top:0;
  border-radius:0;
  overflow:visible;
}

/* chat row — simplified flow layout (no grid) */
.row{
  padding:6px 12px;
  border-bottom:1px solid rgba(42,42,45,0.6);
  line-height:1.35;
  display:flex;
  flex-wrap:wrap;
  align-items:flex-start;
  gap:6px 8px;

  text-indent:-140px;
  padding-left:140px;
}

.time{
  font-family:var(--mono);
  font-size:13px;
  color:#7f7f8a;
  white-space:nowrap;
  letter-spacing:0.2px;
  margin-right:8px;
  flex:0 0 auto;
}

.user{
  font-weight:600;
  margin-right:6px;
  white-space:nowrap;
  flex:0 0 auto;
}
.user::after{
  content: ":";
  color:#e7e7ea;
  margin-right:4px;
}

.msg{
  color:var(--text);
  word-break:break-word;
  overflow-wrap:break-word;
  flex:1 1 auto;
  min-width:0;
}
.emote{
  height:24px;
  vertical-align:-4px;
  margin:0 1px;
}
.reply{ display:inline-block; vertical-align:middle; color:var(--muted); font-size:12px; margin-right:6px; }

/* export helper (unchanged) */
.export-wrap{position:fixed;left:-99999px;top:0;width:390px;background:#18181f;padding:24px}
.export-row{padding:6px 0;border-bottom:none}
.export-row:last-child{border-bottom:none}
.export-meta{display:flex;justify-content:space-between;align-items:center;margin-top:18px;padding-top:14px;border-top:1px solid rgba(255,255,255,.08);font-size:14px;color:#b9b9c6}
.export-meta-left{
  display:flex;
  align-items:center;
  gap:8px;
}

.export-meta-left img{
  height:20px;
}

/* ===== Desktop layout ===== */
@media (min-width: 900px){
  .page{padding:24px}
  .chat{max-width: calc(var(--controls-w) + var(--chat-w) + var(--gap)); display:flex; gap:var(--gap); align-items:flex-start}

  /* left column becomes fixed-ish via sticky */
  header{
    width:var(--controls-w);
    max-width:none;
    flex:0 0 var(--controls-w);
    position:sticky;
    top:24px; /* offset from viewport top */
    border-radius:14px;
    padding:16px;
    height:fit-content;
  }

  /* make controls vertical and full width of left column */
.controls{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-top:12px;
  align-items:stretch;
}

.controls button{
  flex:0 0 auto;
  width:100%;
  height:32px;
  font-size:13px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 12px;
}

.controls input{
  flex:0 0 auto;
  width:100%;
  height:32px;
  padding:4px 10px;
  font-size:13px;
  line-height:1.2;
}

  /* messages column */
  #list{
    width:var(--chat-w);
    max-width:var(--chat-w);
    flex:0 0 var(--chat-w);
    border-radius:14px;
    min-height:calc(100vh - 48px);
    margin-top:0; /* header is in left column, not above messages */
  }

  /* center whole layout horizontally */
  .page{justify-content:center}
}

/* small refinements for very narrow phones (so content not glued to edges) */
@media (max-width:420px){
  .chat{padding:0 8px}
  header{padding:10px;border-radius:12px}
  #list{margin-top:0;border-radius:0}

  /* увеличиваем читаемость на телефонах */
  .time{ font-size:14px; }
  .msg{ font-size:15px; line-height:1.45; }
  .emote{ height:22px; } /* чуть меньше, чтобы не ломать строки */
}
</style>
</head>
<body>
<div class="page">
  <div class="chat">

    <header>
      <div class="meta">
        <div><b id="title">—</b></div>
        <div class="pill">
          <span id="channel">—</span>
          <span id="streamDateWrap" style="display:none"> • <span id="streamDate">—</span></span>
        </div>
      </div>

      <div class="controls">
        <input id="q" placeholder="Поиск по сообщениям…"/>
        <input id="u" placeholder="Фильтр по нику…"/>
        <button id="vodBtn">🔗 Ссылка VOD</button>
        <button id="exportBtn">📸 Снимок чата</button>
        <button id="toggleTime">⏱️ Время: ON</button>
        <button id="toggleTag">
  <img src="https://cdn.7tv.app/emote/01H1P0YF7G0008W9SSAM2XE7GF/1x.avif" style="height:18px;margin-right:6px">
Подпись: ON
</button>
<span class="pill" id="stat">—</span>
      </div>
    </header>

    <div id="list"></div>

  </div>
</div>

<script id="chat-data" type="application/json">{{CHAT_DATA_JSON}}</script>

<script>
/* JS оставил без изменений логики — только адаптирован под новый DOM.
   Если что-то ломается, это будет видно в консоли, но визуальная часть
   теперь управляется только CSS (mobile: header scrolls away;
   desktop: left column sticky). */

const DATA = JSON.parse(document.getElementById("chat-data").textContent || "{}");
const meta = DATA.meta || {};
const rows = DATA.rows || [];

const MODE = meta.mode || "online";
const LOCAL_EMOTES = meta.local_emotes || {};
const CDN_EMOTES = meta.cdn_emotes || {};
const TWITCH_CHANNEL_ID = meta.channel_id || null;

const elTitle=document.getElementById("title");
const elChannel=document.getElementById("channel");
const elStat=document.getElementById("stat");
const elList=document.getElementById("list");

const elStreamDate=document.getElementById("streamDate");
const elStreamDateWrap=document.getElementById("streamDateWrap");

const elQ=document.getElementById("q");
const elU=document.getElementById("u");
const elToggleTime=document.getElementById("toggleTime");
const elExportBtn=document.getElementById("exportBtn");
const elVodBtn=document.getElementById("vodBtn");
const elToggleTag=document.getElementById("toggleTag");

let SHOW_TIME=true;
let SHOW_TAG=true;

elTitle.textContent = meta.title || "—";
elChannel.textContent = meta.channel || "—";
elVodBtn.addEventListener("click",()=>{
  if(meta.vod_url){
    window.open(meta.vod_url,"_blank");
  }
});

function fmtStreamStart(iso){
  if(!iso) return null;
  try{
    const d = new Date(iso);
    if (Number.isNaN(d.getTime())) return null;
    const y = d.getUTCFullYear();
    const m = String(d.getUTCMonth()+1).padStart(2,"0");
    const dd = String(d.getUTCDate()).padStart(2,"0");
    const hh = String(d.getUTCHours()).padStart(2,"0");
    const mm = String(d.getUTCMinutes()).padStart(2,"0");
    return `${y}-${m}-${dd} ${hh}:${mm} [UTC]`;
  }catch(e){ return null; }
}
const streamStart = fmtStreamStart(meta.created_at);
if(streamStart){ elStreamDate.textContent = streamStart; elStreamDateWrap.style.display = ""; }

function hash32(str){
  let h = 2166136261;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}
function colorForUser(name){
  const u = String(name || "").toLowerCase();
  const h = hash32(u) % 360;
  const s = 78;
  const l = 62;
  return `hsl(${h} ${s}% ${l}%)`;
}
function esc(s){ return (s??"").replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function fetch7tvEmotes(channelId){
  if(!channelId) return new Map();
  try{
    const r = await fetch(`https://7tv.io/v3/users/twitch/${channelId}`);
    if(!r.ok) return new Map();
    const json = await r.json();
    const emotes = json?.emote_set?.emotes || [];
    const map = new Map();
    for(const e of emotes){
      const name = e?.name;
      const host = e?.data?.host;
      if(!name||!host) continue;
      const files = host.files || [];
      const file = files.find(f=>f.name==="1x.webp")||files.find(f=>String(f.name).endsWith(".webp"))||files[0];
      if(!file) continue;
      map.set(name,`https:${host.url}/${file.name}`);
    }
    return map;
  }catch(e){ return new Map(); }
}

function renderTextWithEmotes(el,text,emotes){
  const parts = String(text||"").split(/(\s+)/);
  for(const p of parts){
    const clean = p.replace(/[\u200B-\u200D\uFEFF]/g,'').replace(/[\r\n\t]/g,'');
    if(LOCAL_EMOTES[clean] || CDN_EMOTES[clean]){
      const src = LOCAL_EMOTES[clean] || CDN_EMOTES[clean];
      const img = document.createElement("img");
      img.src = src; img.crossOrigin="anonymous"; img.alt=p; img.title=p; img.className="emote"; el.appendChild(img);
    } else if(emotes.has(clean)){
      const img = document.createElement("img");
      img.src = emotes.get(clean); img.crossOrigin="anonymous"; img.alt=p; img.title=p; img.className="emote"; el.appendChild(img);
    } else {
      el.appendChild(document.createTextNode(p));
    }
  }
}

const CHUNK = 800;
let filtered = rows;
let rendered = 0;
let EMOTES = new Map();
let EMOTES_READY = false;

async function ensureEmotesLoaded(){
  if(EMOTES_READY) return;
  EMOTES_READY = true;
  if(MODE !== "online") return;
  if(!TWITCH_CHANNEL_ID) return;
  try{
    EMOTES = await fetch7tvEmotes(TWITCH_CHANNEL_ID);
    if(rendered>0){ elList.innerHTML=""; rendered=0; renderMore(); }
  }catch(e){ EMOTES = new Map(); }
}

function matches(r,q,u){
  if(u){ if(!r.user||r.user.toLowerCase().indexOf(u)===-1) return false; }
  if(q){ if(!r.text||r.text.toLowerCase().indexOf(q)===-1) return false; }
  return true;
}

async function applyFilters(){
  ensureEmotesLoaded();
  const q=(elQ.value||"").trim().toLowerCase();
  const u=(elU.value||"").trim().toLowerCase();
  filtered = rows.filter(r=>matches(r,q,u));
  elStat.textContent = `Показано: ${filtered.length} / ${rows.length}`;
  elList.innerHTML=""; rendered=0; renderMore();
}

function renderMore(){
  const end = Math.min(rendered+CHUNK, filtered.length);
  const frag = document.createDocumentFragment();
  for(let i=rendered;i<end;i++){
    const r = filtered[i];
    const rowEl = document.createElement("div");
    rowEl.className = "row";
    const tRaw = (r.t || "00:00:00"); const tNorm = String(tRaw).replace(/\s*:\s*/g,":");
    const timeEl = document.createElement("span"); timeEl.className="time"; timeEl.textContent = tNorm;
    const userEl = document.createElement("span"); userEl.className="user"; userEl.textContent = r.user || "—"; userEl.style.color = colorForUser(r.user);
const msgEl = document.createElement("span");
msgEl.className = "msg";

// --- simple reply parsing: ищем возможные поля с ником-целью ---
const replyName = r.reply_to || r.reply_user || r.reply || r.in_reply_to || r.replyNick || r.replyName;
if(replyName){
  const repEl = document.createElement("span");
  repEl.className = "reply";
  repEl.textContent = `↳ @${String(replyName)}: `; // стрелка и ник — компактно
  msgEl.appendChild(repEl);
}

// теперь рендерим сообщение с эмоутами
renderTextWithEmotes(msgEl, r.text || "", EMOTES);
if(SHOW_TIME) rowEl.appendChild(timeEl);
rowEl.appendChild(userEl);
rowEl.appendChild(msgEl);
frag.appendChild(rowEl);
  }
  elList.appendChild(frag); rendered=end;
}

window.addEventListener("scroll",()=>{
  if(window._scrollThrottle) return;
  window._scrollThrottle = setTimeout(()=>{ window._scrollThrottle = null;
    const nearBottom = window.innerHeight + window.scrollY > document.body.offsetHeight - 1200;
    if(nearBottom && rendered < filtered.length) renderMore();
  },80);
});

elQ.addEventListener("input",()=>applyFilters());
elU.addEventListener("input",()=>applyFilters());
elToggleTime.addEventListener("click",()=>{
  SHOW_TIME = !SHOW_TIME;

  elToggleTime.textContent = SHOW_TIME
    ? "⏱️ Время: ON"
    : "⏱️ Время: OFF";

  elToggleTime.style.opacity = SHOW_TIME ? "1" : "0.5";

  elList.innerHTML="";
  rendered=0;
  renderMore();
});

elToggleTag.addEventListener("click",()=>{
  SHOW_TAG = !SHOW_TAG;

  elToggleTag.innerHTML =
  `<img src="https://cdn.7tv.app/emote/01H1P0YF7G0008W9SSAM2XE7GF/1x.avif" style="height:18px;margin-right:6px"> Подпись: ${SHOW_TAG ? "ON" : "OFF"}`;

  elToggleTag.style.opacity = SHOW_TAG ? "1" : "0.5";
});

/* snapshot logic kept intact (uses html2canvas included below) */
async function waitImages(root){
  const imgs=[...root.querySelectorAll("img")];
  await Promise.all(imgs.map(img=> img.complete ? Promise.resolve() : new Promise(res=>{ img.onload=img.onerror=res; })));
}

elExportBtn.addEventListener("click", async ()=>{
  const sel = window.getSelection();
  if(!sel || sel.rangeCount===0 || sel.toString().trim()===""){ alert("Выделите текст сообщений"); return; }
  const range = sel.getRangeAt(0);
  let node = range.startContainer; if(node.nodeType===3) node=node.parentNode;
  const startRow = node.closest(".row"); if(!startRow) return;
  node = range.endContainer; if(node.nodeType===3) node=node.parentNode;
  const endRow = node.closest(".row"); if(!endRow) return;
  const allRows = [...document.querySelectorAll("#list .row")];
  const startIndex = allRows.indexOf(startRow);
  const endIndex   = allRows.indexOf(endRow);
  if(startIndex===-1||endIndex===-1) return;
  const from = Math.min(startIndex,endIndex), to = Math.max(startIndex,endIndex);
  const wrap = document.createElement("div"); wrap.className="export-wrap";
  for(let i=from;i<=to;i++){ const clone = allRows[i].cloneNode(true); clone.classList.remove("row"); clone.classList.add("export-row"); wrap.appendChild(clone); }
  if(SHOW_TAG){

  const metaRow = document.createElement("div");
  metaRow.className="export-meta";

  const metaLeft = document.createElement("div");
  metaLeft.className="export-meta-left";

  const metaRight = document.createElement("div");
  metaRight.className="export-meta-right";

  const channelIcon=document.createElement("img");
  channelIcon.src="https://cdn.7tv.app/emote/01H1P0YF7G0008W9SSAM2XE7GF/1x.avif";
  channelIcon.crossOrigin="anonymous";

  const channelName=document.createElement("span");
  channelName.textContent = meta.channel || "channel";

  metaLeft.appendChild(channelIcon);
  metaLeft.appendChild(channelName);

  const dateIcon=document.createElement("span");
  dateIcon.textContent="📅";

  const dateText=document.createElement("span");
  dateText.textContent = elStreamDate.textContent || "";

  metaRight.appendChild(dateIcon);
  metaRight.appendChild(dateText);

  metaRow.appendChild(metaLeft);
  metaRow.appendChild(metaRight);

  wrap.appendChild(metaRow);
}
  document.body.appendChild(wrap);
  await new Promise(r=>setTimeout(r,50)); await waitImages(wrap);
  let canvas;
  try{
    canvas = await html2canvas(wrap,{backgroundColor:null,useCORS:true,allowTaint:false,scale:2});
  }catch(err){
    document.body.removeChild(wrap);
    console.error("PNG render error:", err);
    const msg = String(err).toLowerCase();
    if(msg.includes("size")||msg.includes("dimension")||msg.includes("height")) alert("Слишком большой фрагмент. Браузер не смог создать изображение.");
    else alert("Ошибка создания изображения. Попробуйте уменьшить фрагмент.");
    return;
  }
  document.body.removeChild(wrap);
  const url = canvas.toDataURL("image/png");
  const overlay = document.createElement("div"); overlay.style.position="fixed"; overlay.style.inset="0"; overlay.style.background="rgba(0,0,0,.85)"; overlay.style.display="flex"; overlay.style.alignItems="center"; overlay.style.justifyContent="center"; overlay.style.zIndex="9999"; overlay.style.padding="20px";
  const img = document.createElement("img"); img.src = url; img.style.maxWidth="100%"; img.style.maxHeight="100%"; img.style.borderRadius="12px"; img.style.boxShadow="0 10px 40px rgba(0,0,0,.6)"; img.addEventListener("click",e=>e.stopPropagation());
  overlay.appendChild(img); overlay.addEventListener("click",()=>overlay.remove()); document.body.appendChild(overlay);
});

applyFilters();
</script>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</body>
</html>
